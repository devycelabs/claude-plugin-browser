<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Claude Scout</title>
<!-- Fonts are cached locally by setup-check.js on SessionStart.
     Loaded from the local server; falls back to system fonts if not yet downloaded. -->
<script>(function(){
  var base = location.protocol === 'file:' ? 'http://localhost:3747' : location.origin;
  var l = document.createElement('link');
  l.rel = 'stylesheet'; l.href = base + '/fonts/fonts.css';
  document.head.appendChild(l);
}());</script>
<style>
/* ── Reset & Tokens ───────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  /* ── Dark (default) ── */
  --bg:          #0a0a0b;
  --surface:     #101013;
  --surface2:    #161619;
  --border:      #1e1e24;
  --border2:     #28282f;
  --text:        #f2ede3;
  --muted:       #72707e;
  --muted2:      #4a4855;
  --toolbar-bg:  rgba(10,10,11,0.92);
  --noise-op:    0.022;
  --header-glow: rgba(224,122,82,0.07);

  --c-anthropic: #e07a52;
  --c-external:  #4a9fe0;
  --c-lsp:       #9a7ae0;
  --c-installed: #4ac67a;
  --c-gold:      #e0c04a;
  --c-amber:     #E8930A;
  --c-scout:     #34d399;

  --f-display:  'Syne', sans-serif;
  --f-mono:     'JetBrains Mono', monospace;
  --f-body:     'Outfit', sans-serif;
  --radius:      8px;
  --radius-sm:   5px;
  --surface3:    #1c1c21;
}

/* ── Light theme ──────────────────────────────────────────── */
html[data-theme="light"] {
  --bg:          #f5f1ea;
  --surface:     #faf8f3;
  --surface2:    #edeae2;
  --border:      #d8d4ca;
  --border2:     #c4c0b6;
  --text:        #1c1a17;
  --muted:       #7a7468;
  --muted2:      #a8a298;
  --toolbar-bg:  rgba(245,241,234,0.94);
  --noise-op:    0.03;
  --header-glow: rgba(224,122,82,0.09);

  --c-anthropic: #c05c30;
  --c-external:  #2878b8;
  --c-lsp:       #6e52c8;
  --c-installed: #2a8a52;
  --surface3:    #e5e1d8;
}

html { font-size: 16px; }
body {
  font-family: var(--f-body);
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}

/* ── Noise texture overlay ────────────────────────────────── */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='1'/%3E%3C/svg%3E");
  opacity: var(--noise-op);
  pointer-events: none;
  z-index: 0;
}

/* ── Header ───────────────────────────────────────────────── */
header {
  position: sticky;
  top: 0;
  z-index: 100;
  background: rgba(10,10,11,0.88);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--border);
}
html[data-theme="light"] header {
  background: rgba(245,241,234,0.92);
}

.header-inner {
  max-width: 1180px;
  margin: 0 auto;
  padding: 0 24px;
  height: 56px;
  display: flex;
  align-items: center;
}

.logo {
  display: flex;
  align-items: center;
  gap: 9px;
  text-decoration: none;
  margin-right: 32px;
  flex-shrink: 0;
}

.logo-mark {
  width: 26px;
  height: 26px;
  background: linear-gradient(135deg, var(--c-scout) 0%, #1fa375 100%);
  border-radius: 6px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: var(--f-mono);
  font-size: 0.72rem;
  color: #0a0a0b;
  font-weight: 700;
  flex-shrink: 0;
  user-select: none;
}

.logo-text {
  font-family: var(--f-display);
  font-weight: 700;
  font-size: 1rem;
  color: var(--text);
  letter-spacing: -0.02em;
}

.header-tabs {
  display: flex;
  align-items: center;
  gap: 2px;
  flex: 1;
  overflow-x: auto;
  scrollbar-width: none;
}
.header-tabs::-webkit-scrollbar { display: none; }

.header-tab {
  position: relative;
  padding: 6px 14px;
  border-radius: var(--radius-sm);
  font-size: 0.82rem;
  font-weight: 500;
  color: var(--muted);
  cursor: pointer;
  transition: all 0.15s;
  border: none;
  background: none;
  font-family: var(--f-body);
  display: flex;
  align-items: center;
  gap: 6px;
  white-space: nowrap;
}
.header-tab:hover { color: var(--text); background: var(--surface2); }
.header-tab.active { color: var(--text); background: var(--surface2); }
.header-tab.active::after {
  content: '';
  position: absolute;
  bottom: -1px;
  left: 14px;
  right: 14px;
  height: 2px;
  background: var(--c-scout);
  border-radius: 1px;
}
.header-tab.f-anthropic.active::after { background: var(--c-anthropic); }
.header-tab.f-external.active::after  { background: var(--c-external); }
.header-tab.f-lsp.active::after       { background: var(--c-lsp); }
.header-tab.f-installed.active::after { background: var(--c-installed); }
.header-tab.f-added.active::after     { background: #a78bfa; }
.header-tab.f-unmonitored.active::after { background: var(--c-gold); }
.header-tab.f-discovered.active::after  { background: #38bdf8; }
.header-tab.f-tools.active::after       { background: var(--c-scout); }

.tab-count {
  font-family: var(--f-mono);
  font-size: 0.68rem;
  font-weight: 500;
  background: var(--surface3);
  color: var(--muted);
  padding: 1px 5px;
  border-radius: 3px;
  min-width: 20px;
  text-align: center;
}
.header-tab.active .tab-count { background: var(--border2); color: var(--text); }

.header-actions {
  display: flex;
  align-items: center;
  gap: 8px;
  flex-shrink: 0;
}

/* ── Stats bar ───────────────────────────────────────────── */
.stats-bar {
  border-bottom: 1px solid var(--border);
  background: var(--surface);
}
.stats-bar-inner {
  max-width: 1180px;
  margin: 0 auto;
  padding: 4px 24px;
  font-family: var(--f-mono);
  font-size: 0.65rem;
  color: var(--muted);
  letter-spacing: 0.05em;
  text-transform: uppercase;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.stats-bar-inner em { color: var(--text); font-style: normal; font-weight: 600; }

/* ── Filter section ─────────────────────────────────────── */
.filter-section {
  max-width: 1180px;
  margin: 0 auto;
  padding: 12px 24px 0;
}

.filter-bar {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 8px 10px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
}

/* Search */
.search-wrap {
  flex: 1;
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 0 6px;
}
.search-icon {
  color: var(--muted2);
  font-size: 1rem;
  flex-shrink: 0;
  user-select: none;
  line-height: 1;
}
input[type="search"] {
  flex: 1;
  padding: 5px 4px;
  background: transparent;
  border: none;
  color: var(--text);
  font-family: var(--f-mono);
  font-size: 0.78rem;
  outline: none;
  letter-spacing: 0.01em;
  min-width: 0;
}
input[type="search"]::placeholder { color: var(--muted2); }
input[type="search"]::-webkit-search-cancel-button { display: none; }

.filter-divider {
  width: 1px;
  height: 22px;
  background: var(--border2);
  flex-shrink: 0;
}

.sort-group {
  display: flex;
  align-items: center;
  gap: 2px;
}
.sort-btn {
  padding: 5px 11px;
  background: none;
  border: none;
  border-radius: var(--radius-sm);
  font-size: 0.78rem;
  color: var(--muted);
  cursor: pointer;
  font-family: var(--f-body);
  font-weight: 500;
  transition: all 0.12s;
  white-space: nowrap;
}
.sort-btn:hover { color: var(--text); background: var(--surface2); }
.sort-btn.active { color: var(--text); background: var(--surface3); }

/* ── Community / archived ───────────────────────────────────── */
.card.archived { opacity: 0.55; }
.card.archived:hover { opacity: 0.75; }
.archived-badge {
  display: inline-block;
  font-size: 0.6rem; font-family: var(--f-mono); font-weight: 600;
  color: var(--muted); background: var(--surface2);
  border: 1px solid var(--border2); border-radius: 3px;
  padding: 1px 5px; position: relative; top: -1px; letter-spacing: 0.02em;
}
.added-badge {
  display: inline-block;
  font-size: 0.6rem; font-family: var(--f-mono); font-weight: 600;
  color: #a78bfa; background: rgba(167,139,250,0.1);
  border: 1px solid rgba(167,139,250,0.25); border-radius: 3px;
  padding: 1px 5px; letter-spacing: 0.02em;
}
.stripe-added       { background: #a78bfa; }
.stripe-unmonitored { background: var(--c-gold); }
.stripe-discovered  { background: #38bdf8; }
.stripe-new-plugin  { background: rgba(56,189,248,0.35); }
.type-unmonitored   { font-family: var(--f-mono); font-size: 0.6rem; letter-spacing: 0.06em;
                      text-transform: uppercase; color: var(--c-gold);
                      background: rgba(224,192,74,0.1); border: 1px solid rgba(224,192,74,0.25);
                      border-radius: 3px; padding: 1px 5px; display: inline-block; margin-bottom: 6px; }

.discovered-badge {
  display: inline-block;
  font-size: 0.6rem; font-family: var(--f-mono); font-weight: 600;
  color: #38bdf8; background: rgba(56,189,248,0.1);
  border: 1px solid rgba(56,189,248,0.25); border-radius: 3px;
  padding: 1px 5px; letter-spacing: 0.02em;
}
.new-plugin-badge {
  display: inline-block;
  font-size: 0.6rem; font-family: var(--f-mono); font-weight: 600;
  color: rgba(56,189,248,0.55); background: rgba(56,189,248,0.06);
  border: 1px solid rgba(56,189,248,0.15); border-radius: 3px;
  padding: 1px 5px; letter-spacing: 0.02em;
}
.fill-discovered { background: #38bdf8; }
.discovered-freshness-row {
  grid-column: 1 / -1;
  padding: 6px 20px;
  font-family: var(--f-mono);
  font-size: 0.57rem;
  letter-spacing: 0.06em;
  color: #2a4a5c;
  border-bottom: 1px solid rgba(56,189,248,0.08);
}
.section-divider-added {
  grid-column: 1/-1;
  padding: 8px 20px;
  font-family: var(--f-mono);
  font-size: 0.65rem;
  letter-spacing: 0.06em;
  color: rgba(167,139,250,0.65);
  border-bottom: 1px solid rgba(167,139,250,0.12);
  background: rgba(167,139,250,0.03);
  display: flex;
  align-items: center;
  gap: 10px;
}
.section-divider-added a {
  color: rgba(167,139,250,0.4);
  text-decoration: none;
  font-size: 0.6rem;
  border-bottom: 1px solid currentColor;
  transition: color 0.15s;
}
.section-divider-added a:hover { color: #a78bfa; }
.section-divider-added .mkt-count {
  margin-left: auto;
  opacity: 0.45;
}

/* ── Grid ────────────────────────────────────────────────── */
.grid-outer {
  max-width: 1180px;
  margin: 0 auto;
  padding: 0 24px 64px;
}

.grid {
  position: relative;
  z-index: 1;
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(310px, 1fr));
  gap: 10px;
}

/* ── Card ────────────────────────────────────────────────── */
@keyframes cardIn {
  from { opacity: 0; transform: translateY(8px); }
  to   { opacity: 1; transform: translateY(0); }
}

.card {
  position: relative;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px;
  display: flex;
  flex-direction: column;
  gap: 10px;
  opacity: 0;
  animation: cardIn 0.28s ease forwards;
  transition: background 0.15s, border-color 0.15s;
  overflow: hidden;
}
.card:hover { background: var(--surface2); border-color: var(--border2); }

/* Top stripe — kept for ignored cards */
.card-stripe {
  height: 2px;
  width: 100%;
  flex-shrink: 0;
  display: none;
}
.stripe-anthropic { background: var(--c-anthropic); }
.stripe-external  { background: var(--c-external); }
.stripe-lsp       { background: var(--c-lsp); }

/* Card top: icon + name + badges */
.card-top {
  display: flex;
  align-items: flex-start;
  gap: 10px;
}

.card-icon {
  width: 34px;
  height: 34px;
  border-radius: 7px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: var(--f-mono);
  font-size: 0.72rem;
  font-weight: 700;
  flex-shrink: 0;
  border: 1px solid var(--border2);
  letter-spacing: -0.02em;
  user-select: none;
}
.icon-anthropic  { background: rgba(224,122,82,0.12); color: var(--c-anthropic); border-color: rgba(224,122,82,0.22); }
.icon-external   { background: rgba(74,159,224,0.12); color: var(--c-external);  border-color: rgba(74,159,224,0.22); }
.icon-lsp        { background: rgba(154,122,224,0.12); color: var(--c-lsp);      border-color: rgba(154,122,224,0.22); }
.icon-discovered { background: rgba(56,189,248,0.10); color: #38bdf8;            border-color: rgba(56,189,248,0.2); }
.icon-tools      { background: rgba(52,211,153,0.10); color: var(--c-scout);     border-color: rgba(52,211,153,0.2); }
.icon-added      { background: rgba(167,139,250,0.10); color: #a78bfa;           border-color: rgba(167,139,250,0.2); }
.icon-unmonitored { background: rgba(224,192,74,0.10); color: var(--c-gold);     border-color: rgba(224,192,74,0.2); }

.card-name-wrap { flex: 1; min-width: 0; }

/* Card name + author */
.card-name {
  font-family: var(--f-mono);
  font-size: 0.82rem;
  font-weight: 600;
  color: var(--text);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  letter-spacing: -0.01em;
  display: flex;
  align-items: baseline;
  gap: 6px;
  flex-wrap: wrap;
}
.card-author {
  font-family: var(--f-body);
  font-size: 0.72rem;
  color: var(--muted);
  margin-top: 3px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.card-badges {
  display: flex;
  align-items: center;
  gap: 4px;
  flex-shrink: 0;
}

/* Description */
.card-desc {
  font-family: var(--f-body);
  font-size: 0.82rem;
  color: var(--muted);
  line-height: 1.5;
  display: -webkit-box;
  -webkit-line-clamp: 5;
  -webkit-box-orient: vertical;
  overflow: hidden;
  flex: 1;
}

/* Star bar (discovered / tools) */
.star-bar-wrap { margin-top: -4px; }
.star-bar-track {
  height: 2px;
  background: var(--border2);
  border-radius: 1px;
  overflow: hidden;
}
.star-bar-fill {
  height: 100%;
  border-radius: 1px;
  transition: width 0.4s ease;
}
.fill-discovered { background: #38bdf8; }
.fill-tools      { background: var(--c-scout); }

/* Card footer: tags + star/install count */
.card-footer {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 8px;
  margin-top: auto;
}

.card-tags {
  display: flex;
  gap: 4px;
  flex-wrap: wrap;
  flex: 1;
  min-width: 0;
}

.tag {
  font-size: 0.68rem;
  color: var(--muted2);
  background: var(--surface3);
  border: 1px solid var(--border);
  padding: 2px 7px;
  border-radius: 3px;
  font-family: var(--f-body);
  white-space: nowrap;
}

.card-stars {
  display: flex;
  align-items: center;
  gap: 3px;
  font-family: var(--f-mono);
  font-size: 0.72rem;
  color: var(--muted);
  flex-shrink: 0;
  white-space: nowrap;
}
.card-stars .star { color: var(--c-gold); font-size: 0.6rem; }

/* Repo link (inline, not absolute-positioned) */
.card-repo {
  font-family: var(--f-mono);
  font-size: 0.6rem;
  letter-spacing: 0.04em;
  color: var(--muted2);
  text-decoration: none;
  transition: color 0.15s;
}
.card-repo:hover { color: var(--muted); }

/* Install command */
.install-cmd {
  font-family: var(--f-mono);
  font-size: 0.72rem;
  color: var(--muted);
  background: var(--surface2);
  border: 1px solid var(--border2);
  border-radius: var(--radius-sm);
  padding: 6px 10px;
  cursor: pointer;
  transition: border-color 0.15s, color 0.15s;
  user-select: all;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  display: flex;
  align-items: center;
  gap: 6px;
}
.install-cmd:hover {
  border-color: var(--c-scout);
  color: var(--text);
}
.install-cmd .prompt {
  color: var(--c-installed);
  font-weight: 600;
  flex-shrink: 0;
  user-select: none;
}
.install-cmd.installed-cmd .prompt { color: var(--c-installed); }
.install-cmd-multi {
  flex-direction: column;
  align-items: stretch;
  gap: 3px;
  white-space: normal;
}
.install-cmd-multi .cmd-line {
  display: flex;
  align-items: center;
  gap: 6px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.install-cmd-multi .cmd-line + .cmd-line {
  border-top: 1px solid var(--border);
  padding-top: 3px;
}
.install-cmd-multi .prompt { color: var(--muted2); font-weight: 600; flex-shrink: 0; user-select: none; }
.install-cmd-multi .prompt.p-add { color: #38bdf8; }
.install-cmd-multi .prompt.p-install { color: var(--c-installed); }

/* Added / unmonitored security strips */
.added-security-strip {
  background: rgba(167,139,250,0.06);
  border-top: 1px solid rgba(167,139,250,0.18);
  padding: 6px 14px;
  font-family: var(--f-mono);
  font-size: 0.58rem;
  letter-spacing: 0.02em;
  color: #a78bfa;
  display: flex;
  align-items: center;
  gap: 6px;
}
.added-security-strip::before { content: '📦'; font-size: 0.65rem; }
.unmonitored-security-strip {
  background: rgba(232,147,10,0.07);
  border-top: 1px solid rgba(232,147,10,0.18);
  padding: 6px 14px;
  font-family: var(--f-mono);
  font-size: 0.58rem;
  letter-spacing: 0.02em;
  color: var(--c-amber, #E8930A);
  display: flex;
  align-items: center;
  gap: 6px;
}
.unmonitored-security-strip::before { content: '🔍'; font-size: 0.65rem; }

.installed-pip {
  display: inline-block;
  width: 6px; height: 6px;
  background: var(--c-installed);
  border-radius: 50%;
  flex-shrink: 0;
  position: relative;
  top: -1px;
  box-shadow: 0 0 6px var(--c-installed);
}


/* ── Empty state ──────────────────────────────────────────── */
.empty {
  grid-column: 1/-1;
  padding: 96px 44px;
  text-align: center;
  background: var(--surface);
}
.empty-title {
  font-family: var(--f-display);
  font-weight: 800;
  font-size: 1.5rem;
  letter-spacing: -0.02em;
  color: var(--muted2);
  text-transform: uppercase;
}
.empty p {
  font-family: var(--f-mono);
  font-size: 0.75rem;
  color: var(--muted2);
  margin-top: 8px;
}

/* ── Toast ────────────────────────────────────────────────── */
.toast {
  position: fixed;
  bottom: 28px;
  right: 28px;
  background: var(--surface2);
  border: 1px solid var(--border2);
  border-left: 3px solid var(--c-installed);
  color: var(--text);
  padding: 10px 16px;
  border-radius: 4px;
  font-family: var(--f-mono);
  font-size: 0.72rem;
  letter-spacing: 0.02em;
  opacity: 0;
  transform: translateX(12px);
  transition: all 0.22s cubic-bezier(0.4,0,0.2,1);
  pointer-events: none;
  z-index: 100;
  max-width: 320px;
  text-overflow: ellipsis;
  overflow: hidden;
  white-space: nowrap;
}
.toast.show { opacity: 1; transform: translateX(0); }

/* ── Sync button & status ─────────────────────────────────── */
.sync-btn {
  font-family: var(--f-mono);
  font-size: 0.68rem;
  font-weight: 500;
  letter-spacing: 0.05em;
  text-transform: uppercase;
  padding: 5px 12px;
  border: 1px solid var(--border2);
  border-radius: 3px;
  background: transparent;
  color: var(--muted);
  cursor: pointer;
  transition: all 0.15s;
  display: flex;
  align-items: center;
  gap: 5px;
}
.sync-btn:hover:not(:disabled) { color: var(--text); border-color: var(--muted); }

  const trackedNames = new Set([
    ...activePlugins().map(p => p.name),
    ...(addedPlugins ?? []).map(p => p.name),
  ]);
  // Build set of all tracked marketplace names dynamically
  const trackedMktNames = new Set([OFFICIAL_MKT]);
  for (const m of (liveMarketplaces ?? [])) trackedMktNames.add(m.name);

  return Object.entries(liveInstalledDetails)
    .filter(([name, d]) => !trackedNames.has(name) && !trackedMktNames.has(d.marketplace))
    .map(([name, d]) => ({
      name,
      displayName: name,
      desc:        '',
      author:      d.marketplace || 'unknown source',
      type:        'unmonitored',
      url:         null,
      installs:    0,
      installed:   true,
      hasUpdate:   false,
      updateInfo:  null,
      archived:    false,
      installedAt: d.installedAt,
      version:     d.version,
      marketplace: d.marketplace,
    }));
}

// ── Restart banner ───────────────────────────────────────────
function updateRestartBanner(data) {
  const el = document.getElementById('restart-banner');
  if (!data?.needsRestart) { el.style.display = 'none'; return; }
  el.style.display = 'flex';
  el.innerHTML = `⟳ Server running <strong>v${esc(data.serverVersion)}</strong> — <strong>v${esc(data.installedVersion)}</strong> is installed. Start a new Claude Code session to apply updates.`;
}

// ── Keyword sub-filters ──────────────────────────────────────
function buildTopicCounts(source, minCount = 1) {
  const counts = {};
  for (const t of (source ?? [])) {
    for (const topic of (t.topics ?? [])) {
      if (topic) counts[topic] = (counts[topic] || 0) + 1;
    }
  }
  return Object.entries(counts)
    .filter(([, count]) => count >= minCount)
    .sort((a, b) => b[1] - a[1])
    .slice(0, 24)
    .map(([kw, count]) => ({ kw, count }));
}

function buildKeywordCounts(source, minCount = 1) {
  const counts = {};
  for (const p of (source ?? [])) {
    for (const kw of (p.keywords ?? [])) {
      if (kw) counts[kw] = (counts[kw] || 0) + 1;
    }
  }
  return Object.entries(counts)
    .filter(([, count]) => count >= minCount)
    .sort((a, b) => b[1] - a[1])
    .slice(0, 24)
    .map(([kw, count]) => ({ kw, count }));
}

function toggleKeyword(kw) {
  if (activeKeywords.has(kw)) activeKeywords.delete(kw);
  else activeKeywords.add(kw);
  updateKeywordFilterRow();
  render();
}

function toggleNew30d() {
  showNew30d = !showNew30d;
  updateKeywordFilterRow();
  render();
}

function updateKeywordFilterRow() {
  const row = document.getElementById('keyword-filter-row');
  const isDisc  = activeFilter === 'discovered';
  const isAdded = activeFilter === 'added';
  const isTools = activeFilter === 'tools';

  if (isDisc  && !discoveredPlugins) { row.style.display = 'none'; return; }
  if (isAdded && !addedPlugins)      { row.style.display = 'none'; return; }
  if (isTools && !toolsData)         { row.style.display = 'none'; return; }
  if (!isDisc && !isAdded && !isTools) { row.style.display = 'none'; return; }

  const keywords = isDisc  ? buildKeywordCounts(discoveredPlugins._raw, 4)
                 : isTools ? buildTopicCounts(toolsData._raw, 2)
                 :           buildKeywordCounts(addedPlugins, 1);

  if (!keywords.length) { row.style.display = 'none'; return; }

  row.className = isAdded ? 'added-kf' : '';
  row.style.display = 'flex';
  const new30dChip = (isDisc || isTools)
    ? `<button class="kw-chip new30d-chip${showNew30d ? ' active' : ''}" onclick="toggleNew30d()">🆕 new · 30d</button>`
    : '';
  const clearBtn = (activeKeywords.size || showNew30d)
    ? `<button class="kf-clear" onclick="activeKeywords.clear();showNew30d=false;updateKeywordFilterRow();render()">clear</button>`
    : '';
  row.innerHTML = `<span class="kf-label">Filter</span>` + new30dChip +
    keywords.map(({ kw, count }) =>
      `<button class="kw-chip${activeKeywords.has(kw) ? ' active' : ''}" onclick="toggleKeyword('${esc(kw)}')">${esc(kw)}<span class="kw-count">${count}</span></button>`
    ).join('') + clearBtn +
    `<span class="kf-note">tags from plugin metadata</span>`;
}

// ── Sync from server ─────────────────────────────────────────
async function syncFromServer() {
  const btn = document.getElementById("sync-btn");
  btn.disabled = true;
  btn.classList.add("syncing");
  setStatus("checking", "syncing…");

  try {
    const resp = await fetch(API, { signal: AbortSignal.timeout(3000) });
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
    const data = await resp.json();

    livePlugins          = data.plugins          ?? null;
    liveInstallCounts    = data.installCounts    ?? null;
    liveInstalled        = data.installed        ?? null;
    liveInstalledDetails = data.installedDetails ?? null;
    liveMarketplaces     = data.marketplaces     ?? null;
    lastSynced           = data.fetchedAt        ?? null;

    const t = lastSynced ? new Date(lastSynced).toLocaleTimeString() : "now";
    setStatus("live", `live · ${t}`);
    updateRestartBanner(data);
    updateUnmonitoredTab();
    render();
    // Kick off background checks — non-blocking
    fetchAddedPlugins();
    fetchDiscoveredPlugins();
  } catch {
    setStatus("offline", "offline");
  } finally {
    btn.disabled = false;
    btn.classList.remove("syncing");
  }
}

async function fetchAddedPlugins() {
  const addedUrl = API.replace('/api/plugins', '/api/added');
  try {
    const resp = await fetch(addedUrl, { signal: AbortSignal.timeout(5_000) });
    if (!resp.ok) return;
    const data = await resp.json();
    addedPlugins = data.plugins ?? [];
    if (addedPlugins.length > 0) {
      document.getElementById('added-count').textContent = `(${addedPlugins.length})`;
      document.getElementById('added-tab').style.display = '';
    } else {
      document.getElementById('added-tab').style.display = 'none';
    }
    updateUnmonitoredTab();
    updateKeywordFilterRow();
    // Race condition fix: re-dedup discovered plugins against newly loaded added names
    if (discoveredPlugins) applyDiscoveredDedup();
    render();
  } catch { /* added fetch is best-effort */ }
}

function applyDiscoveredDedup() {
  if (!discoveredPlugins) return;
  const takenNames = new Set([
    ...activePlugins().map(p => p.name),
    ...(addedPlugins ?? []).map(p => p.name),
  ]);
  // Also exclude by repo — catches cases where plugin name differs but repo matches an added marketplace
  const takenRepos = new Set([
    'anthropics/claude-plugins-official',   // always exclude official repo
    ...(addedPlugins ?? []).map(p => p.marketplaceRepo).filter(Boolean),
  ]);
  const exclude = p => takenNames.has(p.name) || (p.repo && takenRepos.has(p.repo));
  const all = discoveredPlugins._raw ?? [];
  discoveredPlugins = {
    _raw:        all,
    established: all.filter(p => p.tier === 'established' && !exclude(p)),
    new:         all.filter(p => p.tier === 'new'         && !exclude(p)),
  };
  const total = discoveredPlugins.established.length + discoveredPlugins.new.length;
  const tab   = document.getElementById('discovered-tab');
  const cnt   = document.getElementById('discovered-count');
  if (total > 0) {
    cnt.textContent     = `(${total})`;
    tab.style.display   = '';
  } else {
    tab.style.display   = 'none';
    if (activeFilter === 'discovered') setFilter('all', document.querySelector('.filter-btn.f-all'));
  }
}

function applyToolsData() {
  if (!toolsData) return;
  const all = toolsData._raw ?? [];
  toolsData = {
    _raw:        all,
    established: all.filter(t => t.tier === 'established'),
    new:         all.filter(t => t.tier === 'new'),
  };
  const total = toolsData.established.length + toolsData.new.length;
  const tab   = document.getElementById('tools-tab');
  const cnt   = document.getElementById('tools-count');
  if (total > 0) {
    cnt.textContent   = `(${total})`;
    tab.style.display = '';
  } else {
    tab.style.display = 'none';
    if (activeFilter === 'tools') setFilter('all', document.querySelector('.filter-btn.f-all'));
  }
}

async function fetchDiscoveredPlugins() {
  const discoverUrl = API.replace('/api/plugins', '/api/discover');
  try {
    const resp = await fetch(discoverUrl, { signal: AbortSignal.timeout(15_000) });
    if (!resp.ok) return;
    const data = await resp.json();
    const raw = data.plugins ?? [];
    if (!raw.length) return; // tab stays hidden

    discoveredGeneratedAt = data.generatedAt ?? null;

    // Store raw then dedup
    discoveredPlugins = { _raw: raw, established: [], new: [] };
    applyDiscoveredDedup();
    const rawTools = data.tools ?? [];
    if (rawTools.length) {
      toolsGeneratedAt = data.generatedAt ?? null;
      toolsData = { _raw: rawTools, established: [], new: [] };
      applyToolsData();
    }
    updateKeywordFilterRow();
    render();
  } catch { /* best-effort */ }
}

// ── State ────────────────────────────────────────────────────
let activeFilter = "all";
let activeSort = 'popular';

// ── Helpers ──────────────────────────────────────────────────
function esc(s) {
  return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function fmtCount(n) {
  if (!n) return null;
  if (n >= 1000) return (n / 1000).toFixed(n >= 100000 ? 0 : n >= 10000 ? 0 : 1) + "k";
  return String(n);
}

function popPct(n) {
  if (!n) return 0;
  return Math.max(2, Math.round((n / MAX_INSTALLS) * 100));
}

// ── Filter ───────────────────────────────────────────────────
function setFilter(f, btn) {
  activeFilter = f;
  document.querySelectorAll(".header-tab").forEach(b => b.classList.remove("active"));
  btn.classList.add("active");
  // Show "Recently updated" sort on Discovered and Tools tabs
  const recentOpt = document.getElementById('sort-recently-updated');
  if (recentOpt) recentOpt.style.display = (f === 'discovered' || f === 'tools') ? '' : 'none';
  if (f !== 'discovered' && f !== 'added' && f !== 'tools') { activeKeywords.clear(); showNew30d = false; }
  updateKeywordFilterRow();
  render();
}

function setSort(s, btn) {
  activeSort = s;
  document.querySelectorAll('.sort-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  render();
}

// ── Render ───────────────────────────────────────────────────
function render() {
  const q    = document.getElementById("search").value.toLowerCase().trim();
  const sort = activeSort;

  const counts   = activeInstallCounts();
  const instList = activeInstalled();

  let list = activePlugins().map(p => ({
    ...p,
    installs:  counts[p.name] || 0,
    installed: instList.includes(p.name),
    // fallback: construct GitHub URL for embedded data that has no url
    url: p.url || `https://github.com/anthropics/claude-plugins-official/tree/main/${p.type === 'external' ? 'external_plugins' : 'plugins'}/${p.name}`,
  }));

  // Build lists for special tabs
  const unmonitored = getUnmonitoredPlugins();

  // Client-side tier from star count: 0=established(≥25), 1=founding(5–24), 2=new(<5)
  const starTierFn = p => (p.stars || 0) >= 25 ? 0 : (p.stars || 0) >= 5 ? 1 : 2;

  if (activeFilter === 'discovered') {
    let all = [
      ...(discoveredPlugins?.established ?? []),
      ...(discoveredPlugins?.new ?? []),
    ];
    if (showNew30d) {
      const cutoff = Date.now() - 30 * 24 * 60 * 60 * 1000;
      all = all.filter(p => {
        const d = p.repoCreatedAt || p.lastMarketplaceCommit;
        return d && new Date(d).getTime() >= cutoff;
      });
    }
    if (activeKeywords.size) {
      all = all.filter(p => (p.keywords ?? []).some(k => activeKeywords.has(k)));
    }
    let innerCmp;
    if (sort === 'popular') {
      innerCmp = (a, b) => (b.stars || 0) - (a.stars || 0);
    } else if (sort === 'recently-updated') {
      innerCmp = (a, b) => {
        const da = a.lastMarketplaceCommit ? new Date(a.lastMarketplaceCommit).getTime() : 0;
        const db = b.lastMarketplaceCommit ? new Date(b.lastMarketplaceCommit).getTime() : 0;
        return db - da;
      };
    } else {
      innerCmp = (a, b) => a.name.localeCompare(b.name);
    }
    all = [...all].sort((a, b) => (starTierFn(a) - starTierFn(b)) || innerCmp(a, b));
    list = all.map(p => ({
      ...p,
      url:       p.repoUrl,
      installs:  0,
      installed: activeInstalled().includes(p.name),
      hasUpdate: false,
    }));
  } else if (activeFilter === 'tools') {
    let all = [
      ...(toolsData?.established ?? []),
      ...(toolsData?.new ?? []),
    ];
    if (showNew30d) {
      const cutoff = Date.now() - 30 * 24 * 60 * 60 * 1000;
      all = all.filter(t => t.repoCreatedAt && new Date(t.repoCreatedAt).getTime() >= cutoff);
    }
    if (activeKeywords.size) {
      all = all.filter(t => (t.topics ?? []).some(k => activeKeywords.has(k)));
    }
    let innerCmp;
    if (sort === 'popular') {
      innerCmp = (a, b) => (b.stars || 0) - (a.stars || 0);
    } else if (sort === 'recently-updated') {
      innerCmp = (a, b) => {
        const da = a.repoUpdatedAt ? new Date(a.repoUpdatedAt).getTime() : 0;
        const db = b.repoUpdatedAt ? new Date(b.repoUpdatedAt).getTime() : 0;
        return db - da;
      };
    } else {
      innerCmp = (a, b) => a.name.localeCompare(b.name);
    }
    all = [...all].sort((a, b) => (starTierFn(a) - starTierFn(b)) || innerCmp(a, b));
    list = all.map(t => ({
      ...t,
      url:       t.repoUrl,
      installs:  0,
      installed: false,
      hasUpdate: false,
      _isTool:   true,
    }));
  } else if (activeFilter === 'unmonitored') {
    list = unmonitored;
  } else if (activeFilter === 'added') {
    let src = addedPlugins ?? [];
    if (activeKeywords.size) {
      src = src.filter(p => (p.keywords ?? []).some(k => activeKeywords.has(k)));
    }
    list = src.map(p => ({
      ...p,
      installs:  0,
      installed: activeInstalled().includes(p.name),
      hasUpdate: false,
      updateInfo: null,
    }));
    // Always group by marketplace in Added tab
    list.sort((a, b) => (a.marketplace || '').localeCompare(b.marketplace || '') || a.name.localeCompare(b.name));
  } else {
    if (addedPlugins?.length && (activeFilter === 'all' || activeFilter === 'installed')) {
      const officialNames = new Set(list.map(p => p.name));
      const extras = addedPlugins
        .filter(p => !officialNames.has(p.name))
        .map(p => ({ ...p, installs: 0, installed: activeInstalled().includes(p.name),
                     hasUpdate: false, updateInfo: null }));
      list = [...list, ...extras];
    }
    if (activeFilter === "installed") list = list.filter(p => p.installed);
    else if (activeFilter !== "all")  list = list.filter(p => p.type === activeFilter);
  }

  if (q) list = list.filter(p =>
    p.name.toLowerCase().includes(q) ||
    p.desc.toLowerCase().includes(q) ||
    p.author.toLowerCase().includes(q)
  );

  if (activeFilter !== 'discovered') {
    if (sort === "popular")           list.sort((a,b) => b.installs - a.installs);
    else if (sort === "recently-updated") list.sort((a,b) => {
      const da = a.lastMarketplaceCommit ? new Date(a.lastMarketplaceCommit).getTime() : 0;
      const db = b.lastMarketplaceCommit ? new Date(b.lastMarketplaceCommit).getTime() : 0;
      return db - da;
    });
    else                              list.sort((a,b) => a.name.localeCompare(b.name));
  }

  // Separate ignored plugins (dimmed at bottom, or hidden entirely when hideIgnored)
  const ignoredList = hideIgnored ? [] : list.filter(p => ignoredPlugins.has(p.name));
  list = list.filter(p => !ignoredPlugins.has(p.name));

  // Stats — total pool varies by active tab
  const addedExtras = addedPlugins?.filter(p => !new Set(activePlugins().map(q => q.name)).has(p.name)).length ?? 0;
  const discoveredTotal = (discoveredPlugins?.established?.length ?? 0) + (discoveredPlugins?.new?.length ?? 0);
  const toolsTotal      = (toolsData?.established?.length ?? 0) + (toolsData?.new?.length ?? 0);
  const totalPool = activeFilter === 'added'       ? (addedPlugins?.length ?? 0)
                  : activeFilter === 'unmonitored' ? unmonitored.length
                  : activeFilter === 'discovered'  ? discoveredTotal
                  : activeFilter === 'tools'       ? toolsTotal
                  : activePlugins().length + (activeFilter === 'all' || activeFilter === 'installed' ? addedExtras : 0);
  const visibleCount = list.length + ignoredList.length;
  const itemLabel = activeFilter === 'tools' ? 'tools' : 'plugins';
  document.getElementById("stats").innerHTML =
    `<em>${visibleCount}</em> of <em>${totalPool}</em> ${itemLabel}`;
  const hc = document.getElementById('header-count'); if (hc) hc.textContent = visibleCount;
  const tcAll = document.getElementById('tab-count-all'); if (tcAll) tcAll.textContent = visibleCount;

  // Grid
  const grid = document.getElementById("grid");

  if (!list.length && !ignoredList.length) {
    grid.innerHTML = `<div class="empty"><div class="empty-title">Nothing found</div><p>Try a different search term or filter.</p></div>`;
    return;
  }

  // For discovered/tools tabs: split list back into tiers to render divider
  const isDiscovered = activeFilter === 'discovered';
  const isToolsTab   = activeFilter === 'tools';
  const isAddedTab   = activeFilter === 'added';
  // After keyword/topic filtering, count per tier (computed from star count)
  const establishedCount = (isDiscovered || isToolsTab) ? list.filter(p => (p.stars || 0) >= 25).length : 0;
  const foundingCount    = (isDiscovered || isToolsTab) ? list.filter(p => { const s = p.stars || 0; return s >= 5 && s < 25; }).length : 0;
  // Pre-compute per-marketplace plugin counts for Added tab dividers
  const mktCounts = {};
  if (isAddedTab) {
    for (const p of list) mktCounts[p.marketplace || ''] = (mktCounts[p.marketplace || ''] || 0) + 1;
  }

  const freshnessRow = isDiscovered ? (() => {
    const dateStr = discoveredGeneratedAt
      ? new Date(discoveredGeneratedAt).toLocaleDateString(undefined, { year: 'numeric', month: 'short', day: 'numeric' })
      : 'unknown';
    return `<div class="discovered-freshness-row">🔭 Found via GitHub Code Search · updated twice weekly via GitHub Actions (Sundays &amp; Wednesdays UTC) · last run: ${dateStr}</div>`;
  })() : isToolsTab ? (() => {
    const dateStr = toolsGeneratedAt
      ? new Date(toolsGeneratedAt).toLocaleDateString(undefined, { year: 'numeric', month: 'short', day: 'numeric' })
      : 'unknown';
    return `<div class="tools-freshness-row">🔧 MCP tools found via GitHub topic search (mcp-server · claude-code) · updated weekly · last run: ${dateStr}</div>`;
  })() : '';

  grid.innerHTML = freshnessRow + list.map((p, i) => {
    const count  = fmtCount(p.installs);
    const pct    = popPct(p.installs);
    const delay  = Math.min(i * 28, 500);

    const isAdded           = p.type === 'added';
    const isUnmonitored     = p.type === 'unmonitored';
    const isEstablished     = isDiscovered && i < establishedCount;
    const isFounding        = isDiscovered && i >= establishedCount && i < establishedCount + foundingCount;
    const isNewPlugin       = isDiscovered && i >= establishedCount + foundingCount;
    const isToolEstablished = isToolsTab && i < establishedCount;
    const isToolFounding    = isToolsTab && i >= establishedCount && i < establishedCount + foundingCount;
    const isToolNew         = isToolsTab && i >= establishedCount + foundingCount;

    const stripeClass = isEstablished     ? 'stripe-discovered'
                      : isNewPlugin       ? 'stripe-new-plugin'
                      : isToolEstablished ? 'stripe-tools'
                      : isToolNew         ? 'stripe-tools-dim'
                      : `stripe-${esc(p.type)}`;

    const mktLabel  = p.marketplaceRepo ? p.marketplaceRepo.split('/')[0] : (p.marketplace || 'added');
    const typeLabel = isAdded ? mktLabel
                    : p.type === 'external' ? 'MCP' : p.type?.toUpperCase() ?? '';

    // safe URL: allow http/https only
    const safeUrl = p.url && /^https?:\/\//.test(p.url) ? p.url : '';

    const securityStrip = isAdded
      ? `<div class="added-security-strip">From ${esc(mktLabel)} — review source ${p.installed ? 'before updating' : 'before installing'}</div>`
      : isUnmonitored
      ? `<div class="unmonitored-security-strip">Not tracked by any monitored registry — review before updating</div>`
      : '';

    const typeBadge = isEstablished
      ? '<span class="discovered-badge">plugin</span>'
      : isNewPlugin
      ? '<span class="new-plugin-badge">unverified</span>'
      : isToolEstablished
      ? '<span class="discovered-badge" style="background:var(--c-scout);color:#001a0d">tool</span>'
      : isToolNew
      ? '<span class="new-plugin-badge" style="border-color:rgba(52,211,153,0.4);color:rgba(52,211,153,0.7)">unverified</span>'
      : isAdded
      ? `<span class="added-badge">${esc(mktLabel)}</span>`
      : isUnmonitored
      ? 'unmonitored'
      : esc(typeLabel);

    const typeClass = isEstablished || isNewPlugin ? 'type-discovered'
                    : isToolEstablished || isToolNew ? 'type-tools'
                    : isAdded ? 'type-added'
                    : `type-${esc(p.type)}`;

    const fillClass = isEstablished
      ? 'fill-discovered'
      : isNewPlugin
      ? 'fill-discovered'
      : isToolEstablished || isToolNew
      ? 'fill-tools'
      : `fill-${esc(p.type)}`;

    const fillStyle = isNewPlugin ? ' opacity:0.3;' : isToolNew ? ' opacity:0.35;' : '';

    // Section dividers
    let divider = '';
    const isDiscOrTool = isDiscovered || isToolsTab;
    const newTierCount = list.length - establishedCount - foundingCount;
    if (isDiscOrTool && i === 0 && establishedCount > 0) {
      divider = `<div class="tier-divider"><span class="tier-label established">★ Established · 25+ stars</span><div class="tier-line"></div><span class="tier-count">${establishedCount}</span></div>`;
    } else if (isDiscOrTool && i === establishedCount && foundingCount > 0) {
      divider = `<div class="tier-divider"><span class="tier-label founding">Founding · 5–24 stars</span><div class="tier-line"></div><span class="tier-count">${foundingCount}</span></div>`;
    } else if (isDiscOrTool && i === establishedCount + foundingCount && newTierCount > 0 && (establishedCount > 0 || foundingCount > 0)) {
      divider = `<div class="tier-divider"><span class="tier-label new-tier">New &amp; Unverified · &lt;5 stars</span><div class="tier-line"></div><span class="tier-count">${newTierCount}</span></div>`;
    } else if (isAddedTab && (i === 0 || list[i - 1].marketplace !== p.marketplace)) {
      const mkt     = p.marketplace || 'unknown';
      const repo    = p.marketplaceRepo;
      const cnt     = mktCounts[mkt] || 0;
      const divLabel = repo ? repo.split('/')[0] : mkt;
      const repoLink = repo
        ? `<a href="https://github.com/${esc(repo)}" target="_blank" rel="noopener">${esc(repo)} ↗</a>`
        : '';
      divider = `<div class="section-divider-added">📦 ${esc(divLabel)}${repoLink ? ' · ' + repoLink : ''}<span class="mkt-count">${cnt} plugin${cnt !== 1 ? 's' : ''}</span></div>`;
    }

    const starInfo = (isEstablished || isFounding || isNewPlugin || isToolEstablished || isToolFounding || isToolNew) && p.stars
      ? ` <span style="opacity:0.45;font-size:0.75em">· ${p.stars}★</span>`
      : '';

    // Icon class (2-char initials from name)
    const iconClass = isEstablished || isFounding || isNewPlugin ? 'icon-discovered'
      : isToolEstablished || isToolFounding || isToolNew ? 'icon-tools'
      : isAdded ? 'icon-added'
      : isUnmonitored ? 'icon-unmonitored'
      : p.type === 'anthropic' ? 'icon-anthropic'
      : p.type === 'external'  ? 'icon-external'
      : 'icon-lsp';
    const iconText = esc(p.name.slice(0,2).toUpperCase());

    // Badge html (replaces old typeBadge)
    const badgeHtml = isEstablished
      ? '<span class="discovered-badge">plugin</span>'
      : isFounding
      ? '<span class="discovered-badge" style="opacity:0.75">plugin</span>'
      : isNewPlugin
      ? '<span class="new-plugin-badge">unverified</span>'
      : isToolEstablished
      ? '<span class="discovered-badge" style="background:var(--c-scout);color:#001a0d">tool</span>'
      : isToolFounding
      ? '<span class="discovered-badge" style="background:var(--c-scout);color:#001a0d;opacity:0.75">tool</span>'
      : isToolNew
      ? '<span class="new-plugin-badge" style="border-color:rgba(52,211,153,0.4);color:rgba(52,211,153,0.7)">unverified</span>'
      : isAdded
      ? `<span class="added-badge">${esc(mktLabel)}</span>`
      : isUnmonitored
      ? '<span class="type-unmonitored">unmonitored</span>'
      : '';

    // Star bar (discovered/tools only)
    const isDiscOrToolCard = isEstablished || isFounding || isNewPlugin || isToolEstablished || isToolFounding || isToolNew;
    const starBarPct = isDiscOrToolCard ? Math.min((p.stars || 0) / 500 * 100, 100) : 0;
    const starBarFillClass = (isToolEstablished || isToolFounding || isToolNew) ? 'fill-tools' : 'fill-discovered';
    const starBarHtml = isDiscOrToolCard
      ? `<div class="star-bar-wrap"><div class="star-bar-track"><div class="star-bar-fill ${starBarFillClass}" style="width:${starBarPct}%"></div></div></div>`
      : '';

    // Footer right: stars or install count
    const footerRight = isDiscOrToolCard
      ? (p.stars ? `<span class="card-stars"><span class="star">★</span>${p.stars >= 1000 ? (p.stars/1000).toFixed(1)+'k' : p.stars}</span>` : '')
      : (count    ? `<span class="card-stars">${count} installs</span>` : '');

    // Tags
    const tagsHtml = (() => {
      if (isToolEstablished || isToolFounding || isToolNew) return (p.topics||[]).slice(0,3).map(t=>`<span class="tag">${esc(t)}</span>`).join('');
      if (p.type === 'anthropic') return `<span class="tag">anthropic</span>`;
      if (p.type === 'external')  return `<span class="tag">mcp</span>`;
      if (p.type === 'lsp')       return `<span class="tag">lsp</span>`;
      if (isAdded)                return (p.keywords||[]).slice(0,3).map(k=>`<span class="tag">${esc(k)}</span>`).join('');
      return '';
    })();

    // Install cmd html
    const installHtml = (() => {
      const isTool = isToolEstablished || isToolFounding || isToolNew;
      if (isTool) {
        if (p.installHint) {
          return `<div class="install-cmd install-hint" onclick="copyCmd('${esc(p.installHint)}')" title="Click to copy install command"><span class="prompt">$</span>${esc(p.installHint)}</div>`;
        }
        return safeUrl ? `<a class="install-cmd view-on-github" href="${esc(safeUrl)}" target="_blank" rel="noopener">View on GitHub ↗</a>` : '';
      }
      const installCmd = `/plugin install ${p.name}`;
      if (p.installed) {
        return `<div class="install-cmd installed-cmd" onclick="copyCmd('${esc(installCmd)}')" title="Click to copy"><span class="prompt">✓</span>${esc(installCmd)}</div>`;
      }
      const mktRepo = isEstablished || isNewPlugin ? p.repo : null;
      const mktAdded = mktRepo && liveMarketplaces?.some(m => {
        const slug = mktRepo.replace('/', '-');
        return m.name === slug || m.name === mktRepo.split('/')[1] || slug.endsWith('-' + m.name) || slug.startsWith(m.name + '-');
      });
      if (mktRepo && !mktAdded) {
        const addCmd = `/plugin marketplace add ${mktRepo}`;
        const both   = `${addCmd}\n${installCmd}`;
        return `<div class="install-cmd install-cmd-multi" onclick="copyCmd('${esc(both)}')" title="Click to copy both commands">
          <div class="cmd-line"><span class="prompt p-add">$</span>${esc(addCmd)}</div>
          <div class="cmd-line"><span class="prompt p-install">$</span>${esc(installCmd)}</div>
        </div>`;
      }
      return `<div class="install-cmd" onclick="copyCmd('${esc(installCmd)}')" title="Click to copy"><span class="prompt">$</span>${esc(installCmd)}</div>`;
    })();

    return `${divider}
<div class="card${p.archived ? ' archived' : ''}" style="animation-delay:${delay}ms">
  <div class="card-top">
    <div class="card-icon ${iconClass}">${iconText}</div>
    <div class="card-name-wrap">
      <div class="card-name">${esc(p.name)}${p.installed ? ' <span class="installed-pip" title="Installed"></span>' : ''}${p.archived ? ' <span class="archived-badge">archived</span>' : ''}</div>
      <div class="card-author">${isUnmonitored ? `source: ${esc(p.marketplace||'unknown')}` : `@${esc(p.author)}${starInfo}`}</div>
    </div>
    <div class="card-badges">${badgeHtml}</div>
  </div>
  <div class="card-desc">${isUnmonitored && p.installedAt
    ? `<span style="opacity:0.5;font-size:0.75em;font-family:var(--f-mono)">installed ${esc(new Date(p.installedAt).toLocaleDateString())}${p.version?' · v'+esc(p.version):''}</span>`
    : esc((p.desc||'').length > 400 ? p.desc.slice(0, 400) + '…' : (p.desc||''))}</div>
  ${starBarHtml}
  ${(isToolEstablished||isToolFounding||isToolNew)&&p.topics?.length ? `<div class="topic-pills">${p.topics.slice(0,5).map(t=>`<span class="topic-pill">${esc(t)}</span>`).join('')}</div>` : ''}
  <div class="card-footer">
    <div class="card-tags">${tagsHtml}</div>
    ${footerRight}
  </div>
  ${installHtml}
  ${securityStrip}
  ${safeUrl ? `<a class="card-repo" href="${esc(safeUrl)}" target="_blank" rel="noopener">repo ↗</a>` : ''}
  <span class="ignore-link" onclick="ignorePlugin('${esc(p.name)}')">ignore</span>
</div>`;
  }).join("");

  // Ignored section (dimmed cards at bottom)
  if (ignoredList.length > 0) {
    grid.innerHTML += `<div class="ignored-section-row">— ignored (${ignoredList.length})</div>`;
    grid.innerHTML += ignoredList.map(p => {
      const count     = fmtCount(p.installs);
      const pct       = popPct(p.installs);
      const safeUrl   = p.url && /^https?:\/\//.test(p.url) ? p.url : '';
      const isTool    = !!p._isTool;
      const stripe    = isTool ? (p.tier === 'established' ? 'stripe-tools' : 'stripe-tools-dim')
                      : p.tier ? (p.tier === 'established' ? 'stripe-discovered' : 'stripe-new-plugin')
                      : `stripe-${esc(p.type ?? 'external')}`;
      const fill      = isTool ? 'fill-tools'
                      : p.tier ? 'fill-discovered'
                      : `fill-${esc(p.type ?? 'external')}`;
      const typeLabel = p.type === 'added' ? (p.marketplace || 'added')
                      : p.type === 'external' ? 'MCP' : (p.type?.toUpperCase() ?? '');
      const ignoredBarPct = isTool ? Math.min((p.stars || 0) / 500 * 100, 100) : pct;
      const ignoredPopTxt = isTool ? (p.stars ? `★ ${p.stars}` : '—') : (count ? count + ' installs' : '—');
      const ignoredPopCls = isTool ? (p.stars ? 'has-data' : '') : (count ? 'has-data' : '');
      const ignoredIconClass = isTool ? 'icon-tools'
        : p.tier ? 'icon-discovered'
        : `icon-${p.type ?? 'external'}`;
      return `<div class="card card-ignored">
  <div class="card-top">
    <div class="card-icon ${ignoredIconClass}">${esc(p.name.slice(0,2).toUpperCase())}</div>
    <div class="card-name-wrap">
      <div class="card-name">${esc(p.name)}</div>
      <div class="card-author">@${esc(p.author)}</div>
    </div>
  </div>
  <div class="card-desc">${esc((p.desc||'').length > 400 ? p.desc.slice(0, 400) + '…' : (p.desc||''))}</div>
  <div class="card-footer">
    <div class="card-tags"></div>
    ${ignoredPopTxt ? `<span class="card-stars">${ignoredPopTxt}</span>` : ''}
  </div>
  ${safeUrl ? `<a class="card-repo" href="${esc(safeUrl)}" target="_blank" rel="noopener">repo ↗</a>` : ''}
  <span class="unignore-link" onclick="unignorePlugin('${esc(p.name)}')">unignore</span>
</div>`;
    }).join("");
  }
}

// ── Copy ─────────────────────────────────────────────────────
function copyCmd(cmd) {
  navigator.clipboard.writeText(cmd).then(() => {
    const t = document.getElementById("toast");
    t.textContent = "Copied  " + cmd;
    t.classList.add("show");
    clearTimeout(t._timer);
    t._timer = setTimeout(() => t.classList.remove("show"), 2200);
  });
}

// ── Deep sync (calls claude CLI via server) ───────────────────
async function deepSync() {
  const btn = document.getElementById("deep-sync-btn");
  btn.disabled = true;
  btn.classList.add("syncing");
  btn.querySelector(".spin").textContent = "↓";
  setStatus("checking", "updating…");

  try {
    const resp = await fetch(API.replace('/api/plugins', '/api/deep-sync'),
      { signal: AbortSignal.timeout(65_000) });
    const data = await resp.json();

    if (!resp.ok) throw new Error(data.error || `HTTP ${resp.status}`);

    livePlugins       = data.plugins       ?? null;
    liveInstallCounts = data.installCounts ?? null;
    liveInstalled     = data.installed     ?? null;
    lastSynced        = data.fetchedAt     ?? null;

    const t = lastSynced ? new Date(lastSynced).toLocaleTimeString() : "now";
    setStatus("live", `live · ${t}`);

    const toast = document.getElementById("toast");
    toast.textContent = data.refreshLog ? `Updated · ${data.refreshLog.split('\n')[0]}` : "Marketplace updated";
    toast.classList.add("show");
    clearTimeout(toast._timer);
    toast._timer = setTimeout(() => toast.classList.remove("show"), 3000);

    render();
  } catch (err) {
    setStatus("offline", "update failed");
    const toast = document.getElementById("toast");
    toast.textContent = `Update failed: ${err.message}`;
    toast.classList.add("show");
    clearTimeout(toast._timer);
    toast._timer = setTimeout(() => toast.classList.remove("show"), 4000);
  } finally {
    btn.disabled = false;
    btn.classList.remove("syncing");
    btn.querySelector(".spin").textContent = "↓";
  }
}

// ── Theme ─────────────────────────────────────────────────────
function applyTheme(theme) {
  document.documentElement.dataset.theme = theme;
  document.getElementById('theme-btn').textContent = theme === 'dark' ? '☀ Light' : '◗ Dark';
}

function toggleTheme() {
  const next = document.documentElement.dataset.theme === 'dark' ? 'light' : 'dark';
  localStorage.setItem('plugin-browser-theme', next);
  applyTheme(next);
}

function initTheme() {
  const saved   = localStorage.getItem('plugin-browser-theme');
  const sysDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
  applyTheme(saved ?? (sysDark ? 'dark' : 'light'));
}

// ── Init ─────────────────────────────────────────────────────
initTheme();
updateIgnoredChip();
render();
syncFromServer();
</script>
