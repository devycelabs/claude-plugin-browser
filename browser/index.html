<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Plugin Registry — claude-plugins-official</title>
<!-- Fonts are cached locally by setup-check.js on SessionStart.
     Loaded from the local server; falls back to system fonts if not yet downloaded. -->
<script>(function(){
  var base = location.protocol === 'file:' ? 'http://localhost:3747' : location.origin;
  var l = document.createElement('link');
  l.rel = 'stylesheet'; l.href = base + '/fonts/fonts.css';
  document.head.appendChild(l);
}());</script>
<style>
/* ── Reset & Tokens ───────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  /* ── Dark (default) ── */
  --bg:          #0a0a0b;
  --surface:     #101013;
  --surface2:    #161619;
  --border:      #1e1e24;
  --border2:     #28282f;
  --text:        #f2ede3;
  --muted:       #72707e;
  --muted2:      #4a4855;
  --toolbar-bg:  rgba(10,10,11,0.92);
  --noise-op:    0.022;
  --header-glow: rgba(224,122,82,0.07);

  --c-anthropic: #e07a52;
  --c-external:  #4a9fe0;
  --c-lsp:       #9a7ae0;
  --c-installed: #4ac67a;
  --c-gold:      #e0c04a;
  --c-amber:     #E8930A;

  --f-display:  'Syne', sans-serif;
  --f-mono:     'JetBrains Mono', monospace;
  --f-body:     'Outfit', sans-serif;
}

/* ── Light theme ──────────────────────────────────────────── */
html[data-theme="light"] {
  --bg:          #f5f1ea;
  --surface:     #faf8f3;
  --surface2:    #edeae2;
  --border:      #d8d4ca;
  --border2:     #c4c0b6;
  --text:        #1c1a17;
  --muted:       #7a7468;
  --muted2:      #a8a298;
  --toolbar-bg:  rgba(245,241,234,0.94);
  --noise-op:    0.03;
  --header-glow: rgba(224,122,82,0.09);

  --c-anthropic: #c05c30;
  --c-external:  #2878b8;
  --c-lsp:       #6e52c8;
  --c-installed: #2a8a52;
}

html { font-size: 16px; }
body {
  font-family: var(--f-body);
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}

/* ── Noise texture overlay ────────────────────────────────── */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='1'/%3E%3C/svg%3E");
  opacity: var(--noise-op);
  pointer-events: none;
  z-index: 0;
}

/* ── Header ───────────────────────────────────────────────── */
header {
  position: relative;
  padding: 44px 44px 32px;
  border-bottom: 1px solid var(--border);
  overflow: hidden;
  z-index: 1;
}

header::after {
  content: '';
  position: absolute;
  top: -60px; right: -80px;
  width: 380px; height: 380px;
  background: radial-gradient(circle, var(--header-glow) 0%, transparent 70%);
  pointer-events: none;
}

.header-top {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 24px;
}

.header-title {
  font-family: var(--f-display);
  font-weight: 800;
  font-size: clamp(2rem, 4vw, 3rem);
  line-height: 0.95;
  letter-spacing: -0.03em;
  color: var(--text);
  text-transform: uppercase;
}

.header-title .dim { color: var(--muted2); }

.header-count {
  font-family: var(--f-display);
  font-weight: 800;
  font-size: clamp(3rem, 6vw, 5rem);
  line-height: 1;
  letter-spacing: -0.04em;
  color: var(--border2);
  user-select: none;
  flex-shrink: 0;
  align-self: flex-end;
}

.header-meta {
  margin-top: 14px;
  display: flex;
  align-items: center;
  gap: 16px;
  flex-wrap: wrap;
}

.header-tag {
  font-family: var(--f-mono);
  font-size: 0.7rem;
  color: var(--muted);
  padding: 3px 8px;
  border: 1px solid var(--border2);
  border-radius: 3px;
  letter-spacing: 0.04em;
  text-transform: uppercase;
}

.header-dot {
  width: 3px; height: 3px;
  background: var(--muted2);
  border-radius: 50%;
}

/* ── Toolbar ─────────────────────────────────────────────── */
.toolbar {
  position: sticky;
  top: 0;
  z-index: 10;
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 12px 44px;
  background: var(--toolbar-bg);
  backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--border);
  flex-wrap: wrap;
}

/* Search */
.search-wrap {
  position: relative;
  flex: 0 0 auto;
  width: 240px;
}
.search-prompt {
  position: absolute;
  left: 10px;
  top: 50%;
  transform: translateY(-50%);
  font-family: var(--f-mono);
  font-size: 0.75rem;
  color: var(--c-anthropic);
  pointer-events: none;
  user-select: none;
}
input[type="search"] {
  width: 100%;
  padding: 7px 10px 7px 26px;
  background: var(--surface);
  border: 1px solid var(--border2);
  border-radius: 4px;
  color: var(--text);
  font-family: var(--f-mono);
  font-size: 0.78rem;
  outline: none;
  transition: border-color 0.2s, box-shadow 0.2s;
  letter-spacing: 0.01em;
}
input[type="search"]:focus {
  border-color: var(--c-anthropic);
  box-shadow: 0 0 0 2px rgba(224,122,82,0.1);
}
input[type="search"]::placeholder { color: var(--muted2); }
input[type="search"]::-webkit-search-cancel-button { display: none; }

/* Filter pills */
.filters {
  display: flex;
  gap: 3px;
  flex-wrap: wrap;
}
.filter-btn {
  font-family: var(--f-mono);
  font-size: 0.68rem;
  font-weight: 500;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  padding: 5px 12px;
  border: 1px solid var(--border2);
  border-radius: 3px;
  background: transparent;
  color: var(--muted);
  cursor: pointer;
  transition: all 0.15s;
  white-space: nowrap;
}
.filter-btn:hover { color: var(--text); border-color: var(--muted); }
.filter-btn.active.f-all       { background: var(--text);         border-color: var(--text);         color: var(--bg); }
.filter-btn.active.f-anthropic { background: var(--c-anthropic);  border-color: var(--c-anthropic);  color: #fff; }
.filter-btn.active.f-external  { background: var(--c-external);   border-color: var(--c-external);   color: #fff; }
.filter-btn.active.f-lsp       { background: var(--c-lsp);        border-color: var(--c-lsp);        color: #fff; }
.filter-btn.active.f-installed { background: var(--c-installed);  border-color: var(--c-installed);  color: #000; }
.filter-btn.active.f-updates    { background: #E8930A;             border-color: #E8930A;             color: #1C0A0A; }
.filter-btn.f-updates           { color: #E8930A; border-color: rgba(232,147,10,0.35); }
.filter-btn.active.f-community    { background: #a78bfa;             border-color: #a78bfa;             color: #1a0050; }
.filter-btn.f-community           { color: #a78bfa; border-color: rgba(167,139,250,0.35); }
.filter-btn.active.f-unmonitored  { background: var(--c-gold);        border-color: var(--c-gold);       color: #1a1400; }
.filter-btn.f-unmonitored         { color: var(--c-gold); border-color: rgba(224,192,74,0.35); }
.filter-btn.active.f-discovered   { background: #38bdf8; border-color: #38bdf8; color: #051a2e; }
.filter-btn.f-discovered          { color: #38bdf8; border-color: rgba(56,189,248,0.35); }

/* ── Community / archived ───────────────────────────────────── */
.card.archived { opacity: 0.55; }
.card.archived:hover { opacity: 0.75; }
.archived-badge {
  display: inline-block;
  font-size: 0.6rem; font-family: var(--f-mono); font-weight: 600;
  color: var(--muted); background: var(--surface2);
  border: 1px solid var(--border2); border-radius: 3px;
  padding: 1px 5px; position: relative; top: -1px; letter-spacing: 0.02em;
}
.community-badge {
  display: inline-block;
  font-size: 0.6rem; font-family: var(--f-mono); font-weight: 600;
  color: #a78bfa; background: rgba(167,139,250,0.1);
  border: 1px solid rgba(167,139,250,0.25); border-radius: 3px;
  padding: 1px 5px; letter-spacing: 0.02em;
}
.stripe-community   { background: #a78bfa; }
.stripe-unmonitored { background: var(--c-gold); }
.stripe-discovered  { background: #38bdf8; }
.stripe-new-plugin  { background: rgba(56,189,248,0.35); }
.type-unmonitored   { font-family: var(--f-mono); font-size: 0.6rem; letter-spacing: 0.06em;
                      text-transform: uppercase; color: var(--c-gold);
                      background: rgba(224,192,74,0.1); border: 1px solid rgba(224,192,74,0.25);
                      border-radius: 3px; padding: 1px 5px; display: inline-block; margin-bottom: 6px; }

.discovered-badge {
  display: inline-block;
  font-size: 0.6rem; font-family: var(--f-mono); font-weight: 600;
  color: #38bdf8; background: rgba(56,189,248,0.1);
  border: 1px solid rgba(56,189,248,0.25); border-radius: 3px;
  padding: 1px 5px; letter-spacing: 0.02em;
}
.new-plugin-badge {
  display: inline-block;
  font-size: 0.6rem; font-family: var(--f-mono); font-weight: 600;
  color: rgba(56,189,248,0.55); background: rgba(56,189,248,0.06);
  border: 1px solid rgba(56,189,248,0.15); border-radius: 3px;
  padding: 1px 5px; letter-spacing: 0.02em;
}
.discovered-security-strip {
  background: rgba(56,189,248,0.06);
  border-top: 1px solid rgba(56,189,248,0.18);
  padding: 6px 14px;
  font-family: var(--f-mono);
  font-size: 0.58rem;
  letter-spacing: 0.02em;
  color: #38bdf8;
  display: flex;
  align-items: center;
  gap: 6px;
}
.discovered-security-strip::before { content: '🔭'; font-size: 0.65rem; }
.new-plugin-security-strip {
  background: rgba(56,189,248,0.04);
  border-top: 1px solid rgba(56,189,248,0.12);
  padding: 6px 14px;
  font-family: var(--f-mono);
  font-size: 0.58rem;
  letter-spacing: 0.02em;
  color: var(--muted);
  display: flex;
  align-items: center;
  gap: 6px;
}
.new-plugin-security-strip::before { content: '⚠'; font-size: 0.65rem; }
.fill-discovered { background: #38bdf8; }
.section-divider {
  grid-column: 1/-1;
  padding: 8px 20px;
  font-family: var(--f-mono);
  font-size: 0.65rem;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: rgba(56,189,248,0.5);
  border-bottom: 1px solid rgba(56,189,248,0.12);
  background: rgba(56,189,248,0.03);
}

/* Sort */
.sort-wrap {
  margin-left: auto;
  display: flex;
  align-items: center;
  gap: 7px;
  font-family: var(--f-mono);
  font-size: 0.68rem;
  color: var(--muted);
  letter-spacing: 0.04em;
  text-transform: uppercase;
}
select {
  font-family: var(--f-mono);
  font-size: 0.7rem;
  padding: 5px 8px;
  background: var(--surface);
  border: 1px solid var(--border2);
  border-radius: 4px;
  color: var(--text);
  cursor: pointer;
  outline: none;
  transition: border-color 0.15s;
  letter-spacing: 0.02em;
}
select:focus { border-color: var(--muted); }

/* ── Stats row ───────────────────────────────────────────── */
.stats-row {
  position: relative;
  z-index: 1;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 9px 44px;
  border-bottom: 1px solid var(--border);
  font-family: var(--f-mono);
  font-size: 0.68rem;
  color: var(--muted);
  letter-spacing: 0.05em;
  text-transform: uppercase;
}
.stats-row em { color: var(--text); font-style: normal; font-weight: 600; }
.stats-legend {
  display: flex;
  gap: 14px;
  align-items: center;
}
.legend-dot {
  display: flex;
  align-items: center;
  gap: 5px;
}
.dot {
  width: 6px; height: 6px;
  border-radius: 1px;
  flex-shrink: 0;
}
.dot-anthropic { background: var(--c-anthropic); }
.dot-external  { background: var(--c-external); }
.dot-lsp       { background: var(--c-lsp); }

/* ── Grid ────────────────────────────────────────────────── */
.grid {
  position: relative;
  z-index: 1;
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
  background: var(--border);
  gap: 1px;
}

/* ── Card ────────────────────────────────────────────────── */
@keyframes cardIn {
  from { opacity: 0; transform: translateY(10px); }
  to   { opacity: 1; transform: translateY(0); }
}

.card {
  position: relative;
  background: var(--surface);
  padding: 0;
  display: flex;
  flex-direction: column;
  opacity: 0;
  animation: cardIn 0.28s ease forwards;
  transition: background 0.18s;
  overflow: hidden;
}
.card:hover { background: var(--surface2); }

/* Top stripe */
.card-stripe {
  height: 2px;
  width: 100%;
  flex-shrink: 0;
}
.stripe-anthropic { background: var(--c-anthropic); }
.stripe-external  { background: var(--c-external); }
.stripe-lsp       { background: var(--c-lsp); }

.card-body {
  padding: 18px 20px 16px;
  display: flex;
  flex-direction: column;
  gap: 10px;
  flex: 1;
}

/* Repo link */
.card-repo {
  position: absolute;
  top: 10px; right: 10px;
  display: flex;
  align-items: center;
  gap: 4px;
  font-family: var(--f-mono);
  font-size: 0.6rem;
  letter-spacing: 0.04em;
  color: var(--muted2);
  text-decoration: none;
  background: var(--surface2);
  border: 1px solid var(--border2);
  border-radius: 3px;
  padding: 3px 7px;
  line-height: 1;
  transition: color 0.15s, border-color 0.15s;
}
.card-repo:hover { color: var(--text); border-color: var(--muted2); }

/* Community security strip */
.community-security-strip {
  background: rgba(232,147,10,0.07);
  border-top: 1px solid rgba(232,147,10,0.18);
  padding: 6px 14px;
  font-family: var(--f-mono);
  font-size: 0.58rem;
  letter-spacing: 0.02em;
  color: var(--c-amber, #E8930A);
  display: flex;
  align-items: center;
  gap: 6px;
}
.community-security-strip::before { content: '🔍'; font-size: 0.65rem; }

/* Type label */
.card-type {
  font-family: var(--f-mono);
  font-size: 0.6rem;
  font-weight: 600;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  opacity: 0.75;
}
.type-anthropic  { color: var(--c-anthropic); }
.type-external   { color: var(--c-external); }
.type-lsp        { color: var(--c-lsp); }
.type-discovered { color: #38bdf8; }

/* Plugin name */
.card-name {
  font-family: var(--f-mono);
  font-size: 0.98rem;
  font-weight: 600;
  color: var(--text);
  letter-spacing: -0.02em;
  line-height: 1.2;
  display: flex;
  align-items: baseline;
  gap: 8px;
  flex-wrap: wrap;
}
.installed-pip {
  display: inline-block;
  width: 6px; height: 6px;
  background: var(--c-installed);
  border-radius: 50%;
  flex-shrink: 0;
  position: relative;
  top: -1px;
  box-shadow: 0 0 6px var(--c-installed);
}
.update-pip {
  display: inline-block;
  font-size: 0.6rem;
  font-family: var(--f-mono);
  font-weight: 600;
  color: #1C0A0A;
  background: #E8930A;
  border-radius: 3px;
  padding: 1px 5px;
  position: relative;
  top: -1px;
  letter-spacing: 0.02em;
  cursor: default;
}

/* Author */
.card-author {
  font-family: var(--f-mono);
  font-size: 0.68rem;
  color: var(--muted);
  letter-spacing: 0.02em;
  margin-top: -4px;
}
.card-author span { color: var(--muted); }

/* Description */
.card-desc {
  font-family: var(--f-body);
  font-size: 0.82rem;
  font-weight: 400;
  color: var(--muted);
  line-height: 1.55;
  flex: 1;
}

/* ── Card footer ──────────────────────────────────────────── */
.card-footer {
  padding: 10px 20px 14px;
  display: flex;
  flex-direction: column;
  gap: 8px;
  border-top: 1px solid var(--border);
}

/* Popularity bar */
.pop-row {
  display: flex;
  align-items: center;
  gap: 8px;
}
.pop-bar-wrap {
  flex: 1;
  height: 3px;
  background: var(--border2);
  border-radius: 2px;
  overflow: hidden;
}
.pop-bar-fill {
  height: 100%;
  border-radius: 2px;
  transition: width 0.5s cubic-bezier(0.4,0,0.2,1);
}
.fill-anthropic { background: var(--c-anthropic); }
.fill-external  { background: var(--c-external); }
.fill-lsp       { background: var(--c-lsp); }

.pop-count {
  font-family: var(--f-mono);
  font-size: 0.65rem;
  color: var(--muted);
  white-space: nowrap;
  flex-shrink: 0;
  min-width: 44px;
  text-align: right;
}
.pop-count.has-data { color: var(--muted); }

/* Install command */
.install-cmd {
  font-family: var(--f-mono);
  font-size: 0.68rem;
  color: var(--muted2);
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 3px;
  padding: 5px 10px;
  cursor: pointer;
  transition: all 0.15s;
  user-select: all;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  display: flex;
  align-items: center;
  gap: 6px;
}
.install-cmd:hover {
  border-color: var(--border2);
  color: var(--text);
  background: var(--surface);
}
.install-cmd .prompt {
  color: var(--c-installed);
  font-weight: 600;
  flex-shrink: 0;
  user-select: none;
}
.install-cmd.installed-cmd .prompt { color: var(--c-installed); }
.install-cmd-multi {
  flex-direction: column;
  align-items: stretch;
  gap: 3px;
  white-space: normal;
}
.install-cmd-multi .cmd-line {
  display: flex;
  align-items: center;
  gap: 6px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.install-cmd-multi .cmd-line + .cmd-line {
  border-top: 1px solid var(--border);
  padding-top: 3px;
}
.install-cmd-multi .prompt { color: var(--muted2); font-weight: 600; flex-shrink: 0; user-select: none; }
.install-cmd-multi .prompt.p-add { color: #38bdf8; }
.install-cmd-multi .prompt.p-install { color: var(--c-installed); }

/* ── Empty state ──────────────────────────────────────────── */
.empty {
  grid-column: 1/-1;
  padding: 96px 44px;
  text-align: center;
  background: var(--surface);
}
.empty-title {
  font-family: var(--f-display);
  font-weight: 800;
  font-size: 1.5rem;
  letter-spacing: -0.02em;
  color: var(--muted2);
  text-transform: uppercase;
}
.empty p {
  font-family: var(--f-mono);
  font-size: 0.75rem;
  color: var(--muted2);
  margin-top: 8px;
}

/* ── Toast ────────────────────────────────────────────────── */
.toast {
  position: fixed;
  bottom: 28px;
  right: 28px;
  background: var(--surface2);
  border: 1px solid var(--border2);
  border-left: 3px solid var(--c-installed);
  color: var(--text);
  padding: 10px 16px;
  border-radius: 4px;
  font-family: var(--f-mono);
  font-size: 0.72rem;
  letter-spacing: 0.02em;
  opacity: 0;
  transform: translateX(12px);
  transition: all 0.22s cubic-bezier(0.4,0,0.2,1);
  pointer-events: none;
  z-index: 100;
  max-width: 320px;
  text-overflow: ellipsis;
  overflow: hidden;
  white-space: nowrap;
}
.toast.show { opacity: 1; transform: translateX(0); }

/* ── Sync button & status ─────────────────────────────────── */
.sync-btn {
  font-family: var(--f-mono);
  font-size: 0.68rem;
  font-weight: 500;
  letter-spacing: 0.05em;
  text-transform: uppercase;
  padding: 5px 12px;
  border: 1px solid var(--border2);
  border-radius: 3px;
  background: transparent;
  color: var(--muted);
  cursor: pointer;
  transition: all 0.15s;
  display: flex;
  align-items: center;
  gap: 5px;
}
.sync-btn:hover:not(:disabled) { color: var(--text); border-color: var(--muted); }
.sync-btn:disabled { opacity: 0.4; cursor: default; }
.deep-sync-btn { color: var(--c-external); border-color: rgba(74,159,224,0.3); }
.deep-sync-btn:hover:not(:disabled) { border-color: var(--c-external); color: var(--c-external); }
.sync-btn .spin { display: inline-block; }
.sync-btn.syncing .spin { animation: spin 0.7s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

.status-badge {
  font-family: var(--f-mono);
  font-size: 0.65rem;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  display: flex;
  align-items: center;
  gap: 5px;
  padding: 5px 10px;
  border-radius: 3px;
  border: 1px solid transparent;
  white-space: nowrap;
  transition: all 0.3s;
}
.status-badge.live    { color: var(--c-installed); border-color: rgba(74,198,122,0.2); background: rgba(74,198,122,0.06); }
.status-badge.offline { color: var(--muted2);      border-color: var(--border);        background: transparent; }
.status-badge.checking { color: var(--muted);      border-color: var(--border);        background: transparent; }
.status-dot { width: 5px; height: 5px; border-radius: 50%; background: currentColor; flex-shrink: 0; }
.status-badge.live .status-dot { box-shadow: 0 0 5px var(--c-installed); }

/* ── Theme toggle ─────────────────────────────────────────── */
html { transition: background 0.25s, color 0.25s; }

.theme-btn {
  font-family: var(--f-mono);
  font-size: 0.68rem;
  font-weight: 500;
  letter-spacing: 0.05em;
  text-transform: uppercase;
  padding: 5px 10px;
  border: 1px solid var(--border2);
  border-radius: 3px;
  background: transparent;
  color: var(--muted);
  cursor: pointer;
  transition: all 0.15s;
  display: flex;
  align-items: center;
  gap: 5px;
  flex-shrink: 0;
}
.theme-btn:hover { color: var(--text); border-color: var(--muted); }

/* ── Restart banner ──────────────────────────────────────── */
.restart-banner {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 8px 44px;
  background: rgba(232,147,10,0.07);
  border-bottom: 1px solid rgba(232,147,10,0.22);
  font-family: var(--f-mono);
  font-size: 0.68rem;
  color: #E8930A;
  letter-spacing: 0.02em;
}
.restart-banner strong { font-weight: 700; }

/* ── Keyword sub-filters (Discovered tab) ────────────────── */
#keyword-filter-row {
  display: none;
  padding: 8px 44px 10px;
  gap: 6px;
  flex-wrap: wrap;
  border-bottom: 1px solid var(--border);
  background: rgba(56,189,248,0.03);
  align-items: center;
}
#keyword-filter-row .kf-label {
  font-family: var(--f-mono);
  font-size: 0.6rem;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  color: var(--muted2);
  margin-right: 2px;
  flex-shrink: 0;
}
.kw-chip {
  font-family: var(--f-mono);
  font-size: 0.62rem;
  padding: 3px 9px;
  border: 1px solid rgba(56,189,248,0.25);
  border-radius: 10px;
  color: rgba(56,189,248,0.65);
  cursor: pointer;
  transition: all 0.15s;
  white-space: nowrap;
  user-select: none;
  background: transparent;
}
.kw-chip:hover { color: #38bdf8; border-color: #38bdf8; }
.kw-chip.active { background: #38bdf8; color: #051a2e; border-color: #38bdf8; }
.kw-chip .kw-count { opacity: 0.55; font-size: 0.58rem; margin-left: 3px; }
.kf-clear {
  font-family: var(--f-mono);
  font-size: 0.6rem;
  color: var(--muted2);
  cursor: pointer;
  padding: 2px 6px;
  border: 1px solid var(--border2);
  border-radius: 3px;
  background: transparent;
  transition: all 0.15s;
  margin-left: 4px;
}
.kf-clear:hover { color: var(--text); border-color: var(--muted); }

/* ── Page footer ─────────────────────────────────────────── */

  text-align: center;
  padding: 28px 20px 36px;

<!-- Header -->
<header>
  <div class="header-top">
    <div>
      <div class="header-title">
        Plugin<br><span class="dim">Registry</span>
      </div>
    </div>
    <div class="header-count" id="header-count" aria-hidden="true">43</div>

  <div class="header-meta">
    <span class="header-tag">official · local cache</span>
    <div class="header-dot" id="community-dot" style="display:none"></div>
    <span class="header-tag" id="community-header-tag" style="display:none">community · live</span>
  </div>
</header>

<!-- Toolbar -->
<div class="toolbar">
  <div class="search-wrap">
    <span class="search-prompt">&gt;</span>
    <input type="search" id="search" placeholder="search plugins_" oninput="render()" autocomplete="off" spellcheck="false">
  </div>
  <div class="filters">
    <button class="filter-btn f-all active"       onclick="setFilter('all',this)">All</button>
    <button class="filter-btn f-anthropic"         onclick="setFilter('anthropic',this)">Anthropic</button>
    <button class="filter-btn f-external"          onclick="setFilter('external',this)">MCP</button>
    <button class="filter-btn f-lsp"               onclick="setFilter('lsp',this)">LSP</button>
    <button class="filter-btn f-installed"         onclick="setFilter('installed',this)">Installed</button>
    <button class="filter-btn f-updates" id="updates-tab" onclick="setFilter('updates',this)" style="display:none">Updates <span id="updates-count"></span></button>
    <button class="filter-btn f-community" id="community-tab" onclick="setFilter('community',this)" style="display:none">Community <span id="community-count"></span></button>
    <button class="filter-btn f-unmonitored" id="unmonitored-tab" onclick="setFilter('unmonitored',this)" style="display:none">Unmonitored <span id="unmonitored-count"></span></button>
    <button class="filter-btn f-discovered" id="discovered-tab" onclick="setFilter('discovered',this)" style="display:none">Discovered <span id="discovered-count"></span></button>
  </div>
  <div class="sort-wrap">
    <span>Sort</span>
    <select id="sort" onchange="render()">

    <div class="status-dot"></div>
    <span id="status-text">checking</span>
  </div>

  <button class="sync-btn" id="sync-btn" onclick="syncFromServer()" title="Re-read official plugins from local cache">
    <span class="spin">⟳</span> Sync
  </button>

  <button class="sync-btn deep-sync-btn" id="deep-sync-btn" onclick="deepSync()" title="Pull latest from marketplace via claude CLI">
    <span class="spin">↓</span> Update
  </button>

  <button class="theme-btn" id="theme-btn" onclick="toggleTheme()" title="Toggle light/dark mode"></button>
</div>

<!-- Restart banner (hidden until server reports needsRestart) -->
<div id="restart-banner" style="display:none"></div>

<!-- Stats -->
<div class="stats-row">
  <span id="stats"></span>
  <div class="stats-legend">
    <div class="legend-dot"><div class="dot dot-anthropic"></div> Anthropic</div>
    <div class="legend-dot"><div class="dot dot-external"></div> MCP</div>

</div>

<div id="promo-banner"></div>
<div id="keyword-filter-row"></div>
<div class="grid" id="grid"></div>

  { name:"clangd-lsp",         desc:"C/C++ language server (clangd) for Claude Code — code intelligence, diagnostics, and formatting. Supports .c, .h, .cpp, .cc, .hpp, and more.", author:"Anthropic", type:"lsp" },
  { name:"csharp-lsp",         desc:"C# language server for Claude Code, providing code intelligence and diagnostics.",                                                              author:"Anthropic", type:"lsp" },
  { name:"gopls-lsp",          desc:"Go language server for Claude Code, providing code intelligence, refactoring, and analysis.",                                                   author:"Anthropic", type:"lsp" },
  { name:"jdtls-lsp",          desc:"Java language server (Eclipse JDT.LS) for Claude Code, providing code intelligence and refactoring.",                                          author:"Anthropic", type:"lsp" },
  { name:"kotlin-lsp",         desc:"Kotlin language server for Claude Code, providing code intelligence, refactoring, and analysis. Supports .kt and .kts files.",                 author:"Anthropic", type:"lsp" },
  { name:"lua-lsp",            desc:"Lua language server for Claude Code, providing code intelligence and diagnostics.",                                                             author:"Anthropic", type:"lsp" },
  { name:"php-lsp",            desc:"PHP language server (Intelephense) for Claude Code, providing code intelligence and diagnostics.",                                              author:"Anthropic", type:"lsp" },
  { name:"pyright-lsp",        desc:"Python language server (Pyright) for Claude Code, providing static type checking and code intelligence.",                                       author:"Anthropic", type:"lsp" },

  { name:"rust-analyzer-lsp",  desc:"Rust language server for Claude Code, providing code intelligence and analysis.",                                                               author:"Anthropic", type:"lsp" },
  { name:"swift-lsp",          desc:"Swift language server (SourceKit-LSP) for Claude Code, providing code intelligence for Swift projects.",                                        author:"Anthropic", type:"lsp" },
  { name:"typescript-lsp",     desc:"TypeScript/JavaScript language server for Claude Code — go-to-definition, find references, error checking, and full code intelligence.",       author:"Anthropic", type:"lsp" },

const INSTALL_COUNTS = {
  "frontend-design":324030,"context7":168830,"code-review":148806,"github":126112,
  "code-simplifier":121217,"feature-dev":119235,"playwright":102750,"ralph-loop":100399,
  "typescript-lsp":95464,"commit-commands":78070,"security-guidance":77466,
  "claude-md-management":76333,"serena":58447,"pr-review-toolkit":53235,
  "skill-creator":50465,"pyright-lsp":48906,"claude-code-setup":46953,
  "supabase":43859,"agent-sdk-dev":36999,"explanatory-output-style":32236,
  "plugin-dev":32029,"greptile":30502,"hookify":27136,"slack":24451,
  "playground":22535,"linear":22326,"learning-output-style":21386,
  "gopls-lsp":18792,"csharp-lsp":18537,"gitlab":16590,"stripe":16573,
  "rust-analyzer-lsp":16206,"php-lsp":14534,"jdtls-lsp":14378,
  "clangd-lsp":12618,"laravel-boost":12438,"firebase":11884,"swift-lsp":11418,
  "kotlin-lsp":9645,"lua-lsp":7459,"asana":5269,"ruby-lsp":583,"example-plugin":31,
};

const MAX_INSTALLS = 324030;

// ── Live data (overrides embedded when server is running) ────
// Relative URL when served over HTTP (works for any host/port).
// Absolute localhost fallback when opened as file://.
const API = location.protocol.startsWith('http')
  ? `${location.origin}/api/plugins`
  : 'http://localhost:3747/api/plugins';

let livePlugins         = null;
let liveInstallCounts   = null;
let liveInstalled       = null;
let liveInstalledDetails= null;
let liveMarketplaces    = null;
let liveUpdates         = null;
let communityPlugins    = null; // fetched from /api/community
let discoveredPlugins   = null; // { established: [...], new: [...] } after fetch
let activeKeywords      = new Set(); // active keyword sub-filters (Discovered tab)
let lastSynced          = null;

const COMMUNITY_MKT_REPO = 'devycelabs/claude-plugins-community';
const COMMUNITY_MKT_NAME = 'devycelabs-claude-plugins-community';

// Tracked marketplaces — plugins from these are shown in their own tabs
const TRACKED_MKTS = new Set(['claude-plugins-official', COMMUNITY_MKT_NAME]);

function getUnmonitoredPlugins() {
  if (!liveInstalledDetails) return [];
  const trackedNames = new Set([
    ...activePlugins().map(p => p.name),
    ...(communityPlugins ?? []).map(p => p.name),
  ]);
  return Object.entries(liveInstalledDetails)
    .filter(([name, d]) => !trackedNames.has(name) && !TRACKED_MKTS.has(d.marketplace))
    .map(([name, d]) => ({
      name,
      displayName: name,
      desc:        '',
      author:      d.marketplace || 'unknown source',
      type:        'unmonitored',
      url:         null,
      installs:    0,
      installed:   true,
      hasUpdate:   false,
      updateInfo:  null,
      archived:    false,
      installedAt: d.installedAt,
      version:     d.version,
      marketplace: d.marketplace,
    }));
}

function communityIsAdded() {
  return liveMarketplaces?.some(m => m.name === COMMUNITY_MKT_NAME) ?? false;
}

function updateUnmonitoredTab() {
  const plugins = getUnmonitoredPlugins();
  const tab = document.getElementById('unmonitored-tab');
  const cnt = document.getElementById('unmonitored-count');
  if (plugins.length > 0) {
    cnt.textContent = `(${plugins.length})`;
    tab.style.display = '';
  } else {
    tab.style.display = 'none';
  }
}

function updatePromo() {
  const banner = document.getElementById('promo-banner');
  if (liveMarketplaces === null || communityIsAdded()) { banner.innerHTML = ''; return; }
  const addCmd = `/plugin marketplace add ${COMMUNITY_MKT_REPO}`;
  banner.innerHTML = `
  <div class="promo-card">
    <div class="promo-card-desc">
      <div class="promo-card-title">Community Marketplace available</div>
      Browse community plugins here, but add the Community Marketplace once to install them directly.
      All plugins remain in their own repos — review before installing.
    </div>
    <div class="promo-cmd" onclick="copyCmd('${esc(addCmd)}')" title="Click to copy">
      <span class="prompt">$</span>${esc(addCmd)}
    </div>
  </div>`;
}

function activePlugins()      { return livePlugins       ?? PLUGINS; }
function activeInstallCounts(){ return liveInstallCounts ?? INSTALL_COUNTS; }
function activeInstalled()    { return liveInstalled      ?? INSTALLED; }

// ── Restart banner ───────────────────────────────────────────
function updateRestartBanner(data) {
  const el = document.getElementById('restart-banner');
  if (!data?.needsRestart) { el.style.display = 'none'; return; }
  el.style.display = 'flex';
  el.innerHTML = `⟳ Server running <strong>v${esc(data.serverVersion)}</strong> — <strong>v${esc(data.installedVersion)}</strong> is installed. Start a new Claude Code session to apply updates.`;
}

// ── Keyword sub-filters ──────────────────────────────────────
function buildKeywordCounts() {
  const counts = {};
  for (const p of (discoveredPlugins?._raw ?? [])) {
    for (const kw of (p.keywords ?? [])) {
      if (kw) counts[kw] = (counts[kw] || 0) + 1;
    }
  }
  return Object.entries(counts)
    .filter(([, count]) => count >= 4)
    .sort((a, b) => b[1] - a[1])
    .slice(0, 24)
    .map(([kw, count]) => ({ kw, count }));
}

function toggleKeyword(kw) {
  if (activeKeywords.has(kw)) activeKeywords.delete(kw);
  else activeKeywords.add(kw);
  updateKeywordFilterRow();
  render();
}

function updateKeywordFilterRow() {
  const row = document.getElementById('keyword-filter-row');
  if (activeFilter !== 'discovered' || !discoveredPlugins) {
    row.style.display = 'none';
    return;
  }
  const keywords = buildKeywordCounts();
  if (!keywords.length) { row.style.display = 'none'; return; }

  row.style.display = 'flex';
  const clearBtn = activeKeywords.size
    ? `<button class="kf-clear" onclick="activeKeywords.clear();updateKeywordFilterRow();render()">clear</button>`
    : '';
  row.innerHTML = `<span class="kf-label">Filter</span>` +
    keywords.map(({ kw, count }) =>
      `<button class="kw-chip${activeKeywords.has(kw) ? ' active' : ''}" onclick="toggleKeyword('${esc(kw)}')">${esc(kw)}<span class="kw-count">${count}</span></button>`
    ).join('') + clearBtn;
}

// ── Status badge ─────────────────────────────────────────────
function setStatus(state, label) {
  const badge = document.getElementById("status-badge");
  const text  = document.getElementById("status-text");
  badge.className = `status-badge ${state}`;
  text.textContent = label ?? state;
}

// ── Sync from server ─────────────────────────────────────────
async function syncFromServer() {
  const btn = document.getElementById("sync-btn");
  btn.disabled = true;
  btn.classList.add("syncing");
  setStatus("checking", "syncing…");

  try {
    const resp = await fetch(API, { signal: AbortSignal.timeout(3000) });
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
    const data = await resp.json();

    livePlugins          = data.plugins          ?? null;
    liveInstallCounts    = data.installCounts    ?? null;
    liveInstalled        = data.installed        ?? null;
    liveInstalledDetails = data.installedDetails ?? null;
    liveMarketplaces     = data.marketplaces     ?? null;
    lastSynced           = data.fetchedAt        ?? null;

    const t = lastSynced ? new Date(lastSynced).toLocaleTimeString() : "now";
    setStatus("live", `live · ${t}`);
    updatePromo();
    updateRestartBanner(data);
    updateUnmonitoredTab();
    render();
    // Kick off background checks — non-blocking
    fetchUpdateStatus();
    fetchCommunityPlugins();
    fetchDiscoveredPlugins();
  } catch {
    setStatus("offline", "offline");
  } finally {
    btn.disabled = false;
    btn.classList.remove("syncing");
  }
}

// ── Update checker ────────────────────────────────────────────
async function fetchUpdateStatus() {
  const updateUrl = API.replace('/api/plugins', '/api/check-updates');
  try {
    const resp = await fetch(updateUrl, { signal: AbortSignal.timeout(30_000) });
    if (!resp.ok) return;
    const data = await resp.json();
    // Build lookup: { pluginName: updateInfo }
    liveUpdates = {};
    for (const u of (data.updates ?? [])) {
      liveUpdates[u.name] = u;
    }
    const updatable = Object.values(liveUpdates).filter(u => u.updateAvailable).length;
    const tab = document.getElementById('updates-tab');
    const cnt = document.getElementById('updates-count');
    if (updatable > 0) {
      cnt.textContent = `(${updatable})`;
      tab.style.display = '';
    }
    render();
  } catch { /* update check is best-effort */ }
}

async function fetchCommunityPlugins() {
  const communityUrl = API.replace('/api/plugins', '/api/community');
  try {
    const resp = await fetch(communityUrl, { signal: AbortSignal.timeout(15_000) });
    if (!resp.ok) return;
    const data = await resp.json();
    communityPlugins = data.plugins ?? [];
    if (communityPlugins.length > 0) {
      document.getElementById('community-count').textContent = `(${communityPlugins.length})`;
      document.getElementById('community-tab').style.display = '';
      document.getElementById('community-dot').style.display = '';
      document.getElementById('community-header-tag').style.display = '';
    }
    updatePromo();
    updateUnmonitoredTab();
    // Race condition fix: re-dedup discovered plugins against newly loaded community names
    if (discoveredPlugins) applyDiscoveredDedup();
    render();
  } catch { /* community fetch is best-effort */ }
}

function applyDiscoveredDedup() {
  if (!discoveredPlugins) return;
  const taken = new Set([
    ...activePlugins().map(p => p.name),
    ...(communityPlugins ?? []).map(p => p.name),
  ]);
  const all = discoveredPlugins._raw ?? [];
  discoveredPlugins = {
    _raw:        all,
    established: all.filter(p => p.tier === 'established' && !taken.has(p.name)),
    new:         all.filter(p => p.tier === 'new'         && !taken.has(p.name)),
  };
  const total = discoveredPlugins.established.length + discoveredPlugins.new.length;
  const tab   = document.getElementById('discovered-tab');
  const cnt   = document.getElementById('discovered-count');
  if (total > 0) {
    cnt.textContent     = `(${total})`;
    tab.style.display   = '';
  } else {
    tab.style.display   = 'none';
    if (activeFilter === 'discovered') setFilter('all', document.querySelector('.filter-btn.f-all'));
  }
}

async function fetchDiscoveredPlugins() {
  const discoverUrl = API.replace('/api/plugins', '/api/discover');
  try {
    const resp = await fetch(discoverUrl, { signal: AbortSignal.timeout(15_000) });
    if (!resp.ok) return;
    const data = await resp.json();
    const raw = data.plugins ?? [];
    if (!raw.length) return; // tab stays hidden

    // Store raw then dedup
    discoveredPlugins = { _raw: raw, established: [], new: [] };
    applyDiscoveredDedup();
    updateKeywordFilterRow();
    render();
  } catch { /* best-effort */ }
}

// ── State ────────────────────────────────────────────────────
let activeFilter = "all";

// ── Helpers ──────────────────────────────────────────────────
function esc(s) {
  return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function fmtCount(n) {
  if (!n) return null;
  if (n >= 1000) return (n / 1000).toFixed(n >= 100000 ? 0 : n >= 10000 ? 0 : 1) + "k";
  return String(n);
}

function popPct(n) {
  if (!n) return 0;
  return Math.max(2, Math.round((n / MAX_INSTALLS) * 100));
}

// ── Filter ───────────────────────────────────────────────────
function setFilter(f, btn) {
  activeFilter = f;
  document.querySelectorAll(".filter-btn").forEach(b => b.classList.remove("active"));
  btn.classList.add("active");
  // Show "Recently updated" sort only on Discovered tab
  const recentOpt = document.getElementById('sort-recently-updated');
  if (recentOpt) recentOpt.style.display = f === 'discovered' ? '' : 'none';
  if (f !== 'discovered') { activeKeywords.clear(); }
  updateKeywordFilterRow();
  render();
}

// ── Render ───────────────────────────────────────────────────
function render() {
  const q    = document.getElementById("search").value.toLowerCase().trim();
  const sort = document.getElementById("sort").value;

  const counts   = activeInstallCounts();
  const instList = activeInstalled();

  let list = activePlugins().map(p => ({
    ...p,
    installs:  counts[p.name] || 0,
    installed: instList.includes(p.name),
    hasUpdate: liveUpdates?.[p.name]?.updateAvailable === true,
    updateInfo: liveUpdates?.[p.name] ?? null,
    // fallback: construct GitHub URL for embedded data that has no url
    url: p.url || `https://github.com/anthropics/claude-plugins-official/tree/main/${p.type === 'external' ? 'external_plugins' : 'plugins'}/${p.name}`,
  }));

  // Build lists for special tabs
  const unmonitored = getUnmonitoredPlugins();

  if (activeFilter === 'discovered') {
    let established = discoveredPlugins?.established ?? [];
    let newPlugins  = discoveredPlugins?.new ?? [];
    // Apply keyword sub-filters
    if (activeKeywords.size) {
      const kf = kw => (kw.keywords ?? []).some(k => activeKeywords.has(k));
      established = established.filter(kf);
      newPlugins  = newPlugins.filter(kf);
    }
    list = [
      ...established,
      ...newPlugins,
    ].map(p => ({
      ...p,
      url:       p.repoUrl,
      installs:  0,
      installed: activeInstalled().includes(p.name),
      hasUpdate: false,
    }));
  } else if (activeFilter === 'unmonitored') {
    list = unmonitored;
  } else if (activeFilter === 'community') {
    list = (communityPlugins ?? []).map(p => ({
      ...p,
      installs:  0,
      installed: activeInstalled().includes(p.name),
      hasUpdate: false,
      updateInfo: null,
    }));
  } else {
    if (communityPlugins?.length && (activeFilter === 'all' || activeFilter === 'installed')) {
      const officialNames = new Set(list.map(p => p.name));
      const extras = communityPlugins
        .filter(p => !officialNames.has(p.name))
        .map(p => ({ ...p, installs: 0, installed: activeInstalled().includes(p.name),
                     hasUpdate: false, updateInfo: null }));
      list = [...list, ...extras];
    }
    if (activeFilter === "installed") list = list.filter(p => p.installed);
    else if (activeFilter === "updates") list = list.filter(p => p.hasUpdate);
    else if (activeFilter !== "all")  list = list.filter(p => p.type === activeFilter);
  }

  if (q) list = list.filter(p =>
    p.name.toLowerCase().includes(q) ||
    p.desc.toLowerCase().includes(q) ||
    p.author.toLowerCase().includes(q)
  );

  if (sort === "popular") list.sort((a,b) => b.installs - a.installs);
  else if (sort === "recently-updated") list.sort((a,b) => {
    const da = a.lastMarketplaceCommit ? new Date(a.lastMarketplaceCommit).getTime() : 0;
    const db = b.lastMarketplaceCommit ? new Date(b.lastMarketplaceCommit).getTime() : 0;
    return db - da;
  });
  else                    list.sort((a,b) => a.name.localeCompare(b.name));

  // Stats — total pool varies by active tab
  const communityExtras = communityPlugins?.filter(p => !new Set(activePlugins().map(q => q.name)).has(p.name)).length ?? 0;
  const discoveredTotal = (discoveredPlugins?.established?.length ?? 0) + (discoveredPlugins?.new?.length ?? 0);
  const totalPool = activeFilter === 'community'   ? (communityPlugins?.length ?? 0)
                  : activeFilter === 'unmonitored' ? unmonitored.length
                  : activeFilter === 'discovered'  ? discoveredTotal
                  : activePlugins().length + (activeFilter === 'all' || activeFilter === 'installed' ? communityExtras : 0);
  document.getElementById("stats").innerHTML =
    `<em>${list.length}</em> of <em>${totalPool}</em> plugins`;
  document.getElementById("header-count").textContent = list.length;

  // Grid
  const grid = document.getElementById("grid");

  if (!list.length) {
    grid.innerHTML = `<div class="empty"><div class="empty-title">Nothing found</div><p>Try a different search term or filter.</p></div>`;
    return;
  }

  // For discovered tab: split list back into tiers to render divider
  const isDiscovered = activeFilter === 'discovered';
  // After keyword filtering, count how many in list are established tier
  const establishedCount = isDiscovered
    ? list.filter(p => p.tier === 'established').length
    : 0;

  grid.innerHTML = list.map((p, i) => {
    const count  = fmtCount(p.installs);
    const pct    = popPct(p.installs);
    const delay  = Math.min(i * 28, 500);

    const isCommunity   = p.type === 'community';
    const isUnmonitored = p.type === 'unmonitored';
    const isEstablished = isDiscovered && i < establishedCount;
    const isNewPlugin   = isDiscovered && i >= establishedCount;

    const stripeClass = isEstablished ? 'stripe-discovered'
                      : isNewPlugin   ? 'stripe-new-plugin'
                      : `stripe-${esc(p.type)}`;

    const typeLabel = isCommunity ? 'community'
                    : p.type === 'external' ? 'MCP' : p.type?.toUpperCase() ?? '';

    // safe URL: allow http/https only
    const safeUrl = p.url && /^https?:\/\//.test(p.url) ? p.url : '';

    const securityStrip = isEstablished
      ? `<div class="discovered-security-strip">Found via GitHub Code Search — not in any managed registry.</div>`
      : isNewPlugin
      ? `<div class="new-plugin-security-strip">Low-star repo — inspect source carefully before installing.</div>`
      : isCommunity
      ? `<div class="community-security-strip">Review source ${p.installed ? 'before updating' : 'before installing'}</div>`
      : isUnmonitored
      ? `<div class="community-security-strip">Not tracked by any monitored registry — review before updating</div>`
      : '';

    const typeBadge = isEstablished
      ? '<span class="discovered-badge">discovered</span>'
      : isNewPlugin
      ? '<span class="new-plugin-badge">unverified</span>'
      : isCommunity
      ? '<span class="community-badge">community</span>'
      : isUnmonitored
      ? 'unmonitored'
      : esc(typeLabel);

    const typeClass = isEstablished || isNewPlugin ? 'type-discovered' : `type-${esc(p.type)}`;

    const fillClass = isEstablished
      ? 'fill-discovered'
      : isNewPlugin
      ? 'fill-discovered'
      : `fill-${esc(p.type)}`;

    const fillStyle = isNewPlugin ? ' opacity:0.3;' : '';

    // Section divider between established and new tiers
    const divider = isDiscovered && i === establishedCount && establishedCount > 0 && list.length > establishedCount
      ? `<div class="section-divider">New &amp; Unverified — 1–4 stars</div>`
      : '';

    const starInfo = (isEstablished || isNewPlugin) && p.stars
      ? ` <span style="opacity:0.45;font-size:0.75em">· ${p.stars}★</span>`
      : '';

    return `${divider}
<div class="card${p.archived ? ' archived' : ''}" style="animation-delay:${delay}ms">
  <div class="card-stripe ${stripeClass}"></div>
  ${safeUrl ? `<a class="card-repo" href="${esc(safeUrl)}" target="_blank" rel="noopener" title="View repository">repo ↗</a>` : ''}
  <div class="card-body">
    <div class="card-type ${typeClass}">${typeBadge}</div>
    <div class="card-name">
      ${esc(p.name)}${p.installed ? ' <span class="installed-pip" title="Installed"></span>' : ''}${p.hasUpdate ? ' <span class="update-pip" title="Update available — reinstall to get latest">↑ update</span>' : ''}${p.archived ? ' <span class="archived-badge" title="No longer actively maintained">archived</span>' : ''}
    </div>
    <div class="card-author">${isUnmonitored
      ? `source: ${esc(p.marketplace || 'unknown')}`
      : `by&nbsp;${esc(p.author)}${starInfo}${p.updateInfo?.latestCommitDate ? ` <span style="opacity:0.45;font-size:0.75em">· latest ${esc(new Date(p.updateInfo.latestCommitDate).toLocaleDateString())}</span>` : ''}`
    }</div>
    <div class="card-desc">${isUnmonitored && p.installedAt
      ? `<span style="opacity:0.5;font-size:0.75em;font-family:var(--f-mono)">installed ${esc(new Date(p.installedAt).toLocaleDateString())}${p.version ? ' · v' + esc(p.version) : ''}</span>`
      : esc(p.desc)
    }</div>
  </div>
  <div class="card-footer">
    <div class="pop-row">
      <div class="pop-bar-wrap"><div class="pop-bar-fill ${fillClass}" style="width:${pct}%;${fillStyle}"></div></div>
      <div class="pop-count ${count ? 'has-data' : ''}">${count ? count + ' installs' : '—'}</div>
    </div>
    ${(()=>{
      const installCmd = `/plugin install ${p.name}`;
      if (p.installed) {
        return `<div class="install-cmd installed-cmd" onclick="copyCmd('${esc(installCmd)}')" title="Click to copy"><span class="prompt">✓</span>${esc(installCmd)}</div>`;
      }
      const mktRepo = isEstablished || isNewPlugin ? p.repo : isCommunity ? p.marketplace : null;
      const mktAdded = mktRepo && liveMarketplaces?.some(m => {
        const slug = mktRepo.replace('/', '-');
        return m.name === slug || m.name === mktRepo.split('/')[1] || slug.endsWith('-' + m.name) || slug.startsWith(m.name + '-');
      });
      if (mktRepo && !mktAdded) {
        const addCmd = `/plugin marketplace add ${mktRepo}`;
        const both   = `${addCmd}\n${installCmd}`;
        return `<div class="install-cmd install-cmd-multi" onclick="copyCmd('${esc(both)}')" title="Click to copy both commands">
          <div class="cmd-line"><span class="prompt p-add">$</span>${esc(addCmd)}</div>
          <div class="cmd-line"><span class="prompt p-install">$</span>${esc(installCmd)}</div>
        </div>`;
      }
      return `<div class="install-cmd" onclick="copyCmd('${esc(installCmd)}')" title="Click to copy"><span class="prompt">$</span>${esc(installCmd)}</div>`;
    })()}
  </div>
  ${securityStrip}
</div>`;
  }).join("");
}

// ── Copy ─────────────────────────────────────────────────────
function copyCmd(cmd) {
  navigator.clipboard.writeText(cmd).then(() => {
    const t = document.getElementById("toast");
    t.textContent = "Copied  " + cmd;
    t.classList.add("show");
    clearTimeout(t._timer);
    t._timer = setTimeout(() => t.classList.remove("show"), 2200);
  });
}

// ── Deep sync (calls claude CLI via server) ───────────────────
async function deepSync() {
  const btn = document.getElementById("deep-sync-btn");
  btn.disabled = true;
  btn.classList.add("syncing");
  btn.querySelector(".spin").textContent = "↓";
  setStatus("checking", "updating…");

  try {
    const resp = await fetch(API.replace('/api/plugins', '/api/deep-sync'),
      { signal: AbortSignal.timeout(65_000) });
    const data = await resp.json();

    if (!resp.ok) throw new Error(data.error || `HTTP ${resp.status}`);

    livePlugins       = data.plugins       ?? null;
    liveInstallCounts = data.installCounts ?? null;
    liveInstalled     = data.installed     ?? null;
    lastSynced        = data.fetchedAt     ?? null;

    const t = lastSynced ? new Date(lastSynced).toLocaleTimeString() : "now";
    setStatus("live", `live · ${t}`);

    const toast = document.getElementById("toast");
    toast.textContent = data.refreshLog ? `Updated · ${data.refreshLog.split('\n')[0]}` : "Marketplace updated";
    toast.classList.add("show");
    clearTimeout(toast._timer);
    toast._timer = setTimeout(() => toast.classList.remove("show"), 3000);

    render();
  } catch (err) {
    setStatus("offline", "update failed");
    const toast = document.getElementById("toast");
    toast.textContent = `Update failed: ${err.message}`;
    toast.classList.add("show");
    clearTimeout(toast._timer);
    toast._timer = setTimeout(() => toast.classList.remove("show"), 4000);
  } finally {
    btn.disabled = false;
    btn.classList.remove("syncing");
    btn.querySelector(".spin").textContent = "↓";
  }
}

// ── Theme ─────────────────────────────────────────────────────
function applyTheme(theme) {
  document.documentElement.dataset.theme = theme;
  document.getElementById('theme-btn').textContent = theme === 'dark' ? '☀ Light' : '◗ Dark';
}

function toggleTheme() {
  const next = document.documentElement.dataset.theme === 'dark' ? 'light' : 'dark';
  localStorage.setItem('plugin-browser-theme', next);
  applyTheme(next);
}

function initTheme() {
  const saved   = localStorage.getItem('plugin-browser-theme');
  const sysDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
  applyTheme(saved ?? (sysDark ? 'dark' : 'light'));
}

// ── Init ─────────────────────────────────────────────────────
initTheme();
render();
syncFromServer();
</script>
